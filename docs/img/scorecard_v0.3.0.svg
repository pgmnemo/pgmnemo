<svg xmlns="http://www.w3.org/2000/svg" width="880" height="720" viewBox="0 0 880 720" font-family="-apple-system, system-ui, sans-serif">
<rect width="100%" height="100%" fill="white"/>
<rect x="0" y="0" width="880" height="110" fill="#f0ad4e"/>
<text x="40" y="50" fill="white" font-size="34" font-weight="700">WATCH</text>
<text x="40" y="80" fill="white" font-size="15" opacity="0.95">One or more categories drifted — monitor next release</text>
<text x="840" y="50" fill="white" font-size="22" font-weight="600" text-anchor="end">pgmnemo v0.3.0</text>
<text x="840" y="78" fill="white" font-size="13" opacity="0.9" text-anchor="end">LoCoMo memory recall benchmark</text>
<text x="40" y="150" fill="#6b7280" font-size="13" font-weight="500" letter-spacing="1">RECALL QUALITY (FINDS THE RIGHT MEMORY IN TOP 10)</text>
<text x="40" y="200" fill="#1f2937" font-size="64" font-weight="700">79.9%</text>
<rect x="240" y="168" width="190" height="32" rx="16" fill="#2ca02c" opacity="0.15"/>
<text x="335" y="190" fill="#2ca02c" font-size="15" font-weight="600" text-anchor="middle">+0.4pp vs 0.2.1</text>
<text x="40" y="225" fill="#6b7280" font-size="13">of 1982 test questions answered with the right session in the top 10 retrieved.</text>
<line x1="40" y1="270" x2="840" y2="270" stroke="#e5e7eb" stroke-width="1"/>
<text x="40" y="300" fill="#1f2937" font-size="16" font-weight="600">By question type — version trajectory</text>
<text x="40" y="320" fill="#6b7280" font-size="12">Each row: current quality + sparkline across all versions. Watch the trend, not single points.</text>
<rect x="40" y="340" width="800" height="54" fill="#f9fafb" rx="4"/>
<text x="60" y="362" fill="#1f2937" font-size="14" font-weight="600">Single-hop questions</text>
<text x="60" y="380" fill="#6b7280" font-size="11">answer comes from one memory chunk</text>
<text x="450" y="372" fill="#1f2937" font-size="22" font-weight="700" text-anchor="end">67.3%</text>
<polyline points="470.0,355.0 570.0,385.0" fill="none" stroke="#6b7280" stroke-width="2"/>
<circle cx="570.0" cy="385.0" r="3.5" fill="#6b7280"/>
<text x="820" y="365" fill="#6b7280" font-size="13" font-weight="600" text-anchor="end">Stable</text>
<text x="820" y="382" fill="#6b7280" font-size="11" text-anchor="end">-0.8pp</text>
<rect x="40" y="400" width="800" height="54" fill="#f9fafb" rx="4"/>
<text x="60" y="422" fill="#1f2937" font-size="14" font-weight="600">Multi-hop reasoning</text>
<text x="60" y="440" fill="#6b7280" font-size="11">needs to combine multiple memories</text>
<text x="450" y="432" fill="#1f2937" font-size="22" font-weight="700" text-anchor="end">82.7%</text>
<polyline points="470.0,415.0 570.0,445.0" fill="none" stroke="#6b7280" stroke-width="2"/>
<circle cx="570.0" cy="445.0" r="3.5" fill="#6b7280"/>
<text x="820" y="425" fill="#6b7280" font-size="13" font-weight="600" text-anchor="end">Stable</text>
<text x="820" y="442" fill="#6b7280" font-size="11" text-anchor="end">-0.8pp</text>
<rect x="40" y="460" width="800" height="54" fill="#f9fafb" rx="4"/>
<text x="60" y="482" fill="#1f2937" font-size="14" font-weight="600">Temporal / time-aware</text>
<text x="60" y="500" fill="#6b7280" font-size="11">asks about timing — currently weakest area</text>
<text x="450" y="492" fill="#1f2937" font-size="22" font-weight="700" text-anchor="end">64.5%</text>
<polyline points="470.0,475.0 570.0,505.0" fill="none" stroke="#f0ad4e" stroke-width="2"/>
<circle cx="570.0" cy="505.0" r="3.5" fill="#f0ad4e"/>
<text x="820" y="485" fill="#f0ad4e" font-size="13" font-weight="600" text-anchor="end">Slight regression</text>
<text x="820" y="502" fill="#f0ad4e" font-size="11" text-anchor="end">-1.5pp</text>
<rect x="40" y="520" width="800" height="54" fill="#f9fafb" rx="4"/>
<text x="60" y="542" fill="#1f2937" font-size="14" font-weight="600">Open-domain queries</text>
<text x="60" y="560" fill="#6b7280" font-size="11">broadest category, largest sample</text>
<text x="450" y="552" fill="#1f2937" font-size="22" font-weight="700" text-anchor="end">83.8%</text>
<polyline points="470.0,565.0 570.0,535.0" fill="none" stroke="#2ca02c" stroke-width="2"/>
<circle cx="570.0" cy="535.0" r="3.5" fill="#2ca02c"/>
<text x="820" y="545" fill="#2ca02c" font-size="13" font-weight="600" text-anchor="end">Slight improvement</text>
<text x="820" y="562" fill="#2ca02c" font-size="11" text-anchor="end">+2.0pp</text>
<rect x="40" y="580" width="800" height="54" fill="#f9fafb" rx="4"/>
<text x="60" y="602" fill="#1f2937" font-size="14" font-weight="600">Adversarial (hard)</text>
<text x="60" y="620" fill="#6b7280" font-size="11">designed to mislead retrieval</text>
<text x="450" y="612" fill="#1f2937" font-size="22" font-weight="700" text-anchor="end">81.8%</text>
<polyline points="470.0,595.0 570.0,625.0" fill="none" stroke="#6b7280" stroke-width="2"/>
<circle cx="570.0" cy="625.0" r="3.5" fill="#6b7280"/>
<text x="820" y="605" fill="#6b7280" font-size="13" font-weight="600" text-anchor="end">Stable</text>
<text x="820" y="622" fill="#6b7280" font-size="11" text-anchor="end">-0.4pp</text>
<line x1="40" y1="650" x2="840" y2="650" stroke="#e5e7eb" stroke-width="1"/>
<text x="40" y="670" fill="#6b7280" font-size="11">Methodology: paper-canonical LoCoMo memory recall benchmark. Higher is better. Full statistical detail → BENCHMARK_PROTOCOL.md</text>
<text x="40" y="686" fill="#6b7280" font-size="11">"WATCH" = a category drifted ≥1pp without statistical significance (sample size too small to confirm regression). Monitored next release.</text>
</svg>