services:
  pgmnemo:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_PASSWORD: pgmnemo
      POSTGRES_DB: pgmnemo
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
