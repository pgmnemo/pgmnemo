name: Publish pgmnemo-mcp Docker image

# Builds the pgmnemo-mcp container and pushes it to Docker Hub on every release
# tag. If DOCKERHUB_USERNAME/DOCKERHUB_TOKEN secrets are not configured, the image
# is built (validating the Dockerfile) but NOT pushed — the release never breaks.
#
# Operator setup (one-time):
#   1. Create the Docker Hub repo (default name: pgmnemo/pgmnemo-mcp), or set the
#      repo variable DOCKERHUB_IMAGE to your own namespace/name.
#   2. Add repo secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (a Docker Hub access token).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag to build (e.g. 0.8.2)'
        required: false

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ github.event.inputs.version }}"
          fi
          [ -z "$V" ] && V="dev"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          # Only move the :latest tag for a real version release (tag push), never
          # for a 'dev'/ad-hoc workflow_dispatch build — otherwise a dev image can
          # silently clobber :latest for every puller.
          if [ "${{ github.event_name }}" = "push" ] && [ "$V" != "dev" ]; then
            echo "push_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "push_latest=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Building pgmnemo-mcp image version: $V (push_latest from this build: see above)"

      - name: Check Docker Hub credentials
        id: creds
        run: |
          if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ] && [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::DOCKERHUB_USERNAME/DOCKERHUB_TOKEN not set — building image without pushing."
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${{ secrets.DOCKERHUB_PASSWORD }}" ]; then
            echo "desc=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::DOCKERHUB_PASSWORD not set — skipping Docker Hub description update (PATs lack metadata scope; the account password is required for this endpoint)."
            echo "desc=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Build a single-arch image into the LOCAL daemon and assert that the
      # package it actually installed reports the version we are about to tag it
      # with. Without this, the :<version> tag is an unverified claim — the image
      # could carry a different pgmnemo-mcp build. Runs before login/push so a
      # mismatch fails the job before anything is published. (Skipped for 'dev'.)
      - name: Build for verification (amd64, load to local daemon)
        uses: docker/build-push-action@v6
        with:
          context: pgmnemo_mcp
          file: pgmnemo_mcp/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: pgmnemo-mcp:verify

      - name: Assert image reports the expected version
        run: |
          V="${{ steps.ver.outputs.version }}"
          ACTUAL=$(docker run --rm --entrypoint python pgmnemo-mcp:verify \
            -c "import importlib.metadata as m; print(m.version('pgmnemo-mcp'))" | tr -d '[:space:]')
          echo "image pgmnemo-mcp version: '$ACTUAL' (expected '$V')"
          if [ "$V" = "dev" ]; then
            echo "::notice::dev build — skipping strict version equality (image reports $ACTUAL)"
          elif [ "$ACTUAL" != "$V" ]; then
            echo "::error::Docker image installs pgmnemo-mcp $ACTUAL but is tagged $V. Refusing to publish a mislabeled image."
            exit 1
          else
            echo "✓ image version matches tag"
          fi

      - name: Log in to Docker Hub
        if: steps.creds.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: pgmnemo_mcp
          file: pgmnemo_mcp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.creds.outputs.push }}
          # :latest only moves for a real version release (see push_latest); a
          # 'dev'/dispatch build publishes only its own :<version> tag.
          tags: |
            ${{ vars.DOCKERHUB_IMAGE || 'pgmnemo/pgmnemo-mcp' }}:${{ steps.ver.outputs.version }}
            ${{ steps.ver.outputs.push_latest == 'true' && format('{0}:latest', vars.DOCKERHUB_IMAGE || 'pgmnemo/pgmnemo-mcp') || '' }}

      - name: Update Docker Hub description + README
        if: steps.creds.outputs.desc == 'true'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: ${{ vars.DOCKERHUB_IMAGE || 'pgmnemo/pgmnemo-mcp' }}
          short-description: "Containerised pgmnemo MCP server — in-Postgres agent memory (ingest/recall) over MCP"
          readme-filepath: pgmnemo_mcp/DOCKERHUB.md
