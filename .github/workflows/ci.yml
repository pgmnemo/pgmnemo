name: CI
on: [push, pull_request]
permissions:
  contents: write
jobs:
  installcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL 17 + pgvector + build deps
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-17 postgresql-17-pgvector postgresql-server-dev-17 build-essential
      - name: Start PostgreSQL 17 and create role/database
        run: |
          sudo pg_createcluster --start 17 main || sudo pg_ctlcluster 17 main start
          sudo -u postgres /usr/lib/postgresql/17/bin/psql -p 5433 -c "CREATE USER runner SUPERUSER PASSWORD 'runner';"
          sudo -u postgres /usr/lib/postgresql/17/bin/psql -p 5433 -c "CREATE DATABASE pgmnemo_test OWNER runner;"
      - name: Build extension
        run: cd extension && make PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
      - name: Install extension
        run: cd extension && sudo make install PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
      - name: Verify extension loads
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5433
          PGDATABASE: pgmnemo_test
        run: /usr/lib/postgresql/17/bin/psql -c "CREATE EXTENSION pgmnemo CASCADE;"
      - name: Run installcheck
        id: installcheck
        continue-on-error: true
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5433
          PGDATABASE: pgmnemo_test
        run: cd extension && make installcheck PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
      - name: Update expected files from PG 17 output (baseline reset)
        if: steps.installcheck.outcome == 'failure' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if ls extension/results/*.out 2>/dev/null; then
            cp extension/results/*.out extension/expected/
            git config user.email "ci@pgmnemo.dev"
            git config user.name "pgmnemo CI"
            git add extension/expected/
            if ! git diff --staged --quiet; then
              git commit -m "test: update pg_regress expected output for PG 17 [skip ci]"
              git push
              echo "BASELINES_UPDATED=true" >> $GITHUB_ENV
            fi
          fi
      - name: Re-run installcheck after baseline update
        if: env.BASELINES_UPDATED == 'true'
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5433
          PGDATABASE: pgmnemo_test
        run: cd extension && make installcheck PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
      - name: Fail if installcheck failed and no baseline update
        if: steps.installcheck.outcome == 'failure' && env.BASELINES_UPDATED != 'true'
        run: |
          cat extension/regression.diffs || true
          exit 1

  bench-gate-presence:
    # PR-time check: if the PR modifies recall_lessons() or migration scripts but
    # does not include a benchmarks/gate/v*.json update, warn the author.
    # This is a soft check on CI (push to main); the hard gate runs on tag push
    # (release.yml).
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect recall-affecting changes
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only origin/main HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE 'extension/pgmnemo--.*\.sql$|extension/pgmnemo\.control$'; then
            if echo "$CHANGED" | grep -qE '^benchmarks/gate/v.*\.json$'; then
              echo "::notice::recall-affecting change + bench gate file updated → OK"
            else
              echo "::warning::This PR modifies extension SQL but does not update benchmarks/gate/. Per docs/WORKFLOW.md §2.2, every release-affecting change should include a bench gate snapshot. Hygiene-only PRs (docs/CHANGELOG) may ignore this."
            fi
          else
            echo "::notice::No extension SQL changes — bench gate not required for this PR"
          fi
