name: CI
on: [push, pull_request]
permissions:
  contents: write
jobs:
  installcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL 17 + pgvector + build deps
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-17 postgresql-17-pgvector postgresql-server-dev-17 build-essential
      - name: Start PostgreSQL 17 and create role/database
        run: |
          sudo pg_createcluster --start 17 main || sudo pg_ctlcluster 17 main start
          sudo -u postgres /usr/lib/postgresql/17/bin/psql -p 5433 -c "CREATE USER runner SUPERUSER PASSWORD 'runner';"
          sudo -u postgres /usr/lib/postgresql/17/bin/psql -p 5433 -c "CREATE DATABASE pgmnemo_test OWNER runner;"
      - name: Build extension
        run: cd extension && make PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
      - name: Install extension
        run: cd extension && sudo make install PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
      - name: Verify extension loads and matches control default_version
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5433
          PGDATABASE: pgmnemo_test
        run: |
          PSQL=/usr/lib/postgresql/17/bin/psql
          $PSQL -c "CREATE EXTENSION pgmnemo CASCADE;"
          WANT=$(grep '^default_version' extension/pgmnemo.control | sed "s/.*= *'//;s/'.*//")
          GOT=$($PSQL -tAc "SELECT extversion FROM pg_extension WHERE extname='pgmnemo'")
          echo "installed extversion: $GOT (control default_version: $WANT)"
          test "$GOT" = "$WANT" || {
            echo "::error::installed pgmnemo $GOT != control default_version $WANT — installcheck would validate the wrong code."
            exit 1
          }
      - name: Run installcheck
        id: installcheck
        continue-on-error: true
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5433
          PGDATABASE: pgmnemo_test
        run: cd extension && make installcheck PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
      - name: Update expected files from PG 17 output (baseline reset)
        # OPT-IN ONLY (hardened 2026-06-23). Previously this auto-committed new
        # expected output on ANY non-ERROR installcheck failure on main — which
        # silently laundered behavioral/ranking changes into the baseline (a
        # non-ERROR diff = "test now passes" forever after). It now requires an
        # explicit [baseline-reset-ok] token in the commit message, so a human
        # has affirmed the diff is a cosmetic PG-version formatting change, not a
        # real regression. Without the token, installcheck failure just fails.
        if: steps.installcheck.outcome == 'failure' && github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[baseline-reset-ok]')
        run: |
          if ls extension/results/*.out 2>/dev/null; then
            # Safety guard: never auto-commit expected files that contain ERROR lines
            # (indicates a real failure, not a cosmetic PG-version formatting difference)
            UNSAFE=""
            for f in extension/results/*.out; do
              if grep -q "^ERROR:" "$f"; then
                echo "::warning::$f contains ERROR lines — skipping auto-baseline-reset for this file"
                UNSAFE="$UNSAFE $f"
              fi
            done
            # Copy only the safe files
            for f in extension/results/*.out; do
              FNAME=$(basename "$f")
              if ! echo "$UNSAFE" | grep -q "$FNAME"; then
                cp "$f" "extension/expected/$FNAME"
              fi
            done
            git config user.email "ci@pgmnemo.dev"
            git config user.name "pgmnemo CI"
            git add extension/expected/
            if ! git diff --staged --quiet; then
              git commit -m "test: update pg_regress expected output for PG 17 [skip ci]"
              git push
              echo "BASELINES_UPDATED=true" >> $GITHUB_ENV
            fi
          fi
      - name: Re-run installcheck after baseline update
        if: env.BASELINES_UPDATED == 'true'
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5433
          PGDATABASE: pgmnemo_test
        run: cd extension && make installcheck PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
      - name: Fail if installcheck failed and no baseline update
        if: steps.installcheck.outcome == 'failure' && env.BASELINES_UPDATED != 'true'
        run: |
          cat extension/regression.diffs || true
          exit 1

  bench-gate-presence:
    # PR-time check: if the PR modifies recall_lessons() or migration scripts but
    # does not include a benchmarks/gate/v*.json update, warn the author.
    # This is a soft check on CI (push to main); the hard gate runs on tag push
    # (release.yml).
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect recall-affecting changes
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only origin/main HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE 'extension/pgmnemo--.*\.sql$|extension/pgmnemo\.control$'; then
            if echo "$CHANGED" | grep -qE '^benchmarks/gate/v.*\.json$'; then
              echo "::notice::recall-affecting change + bench gate file updated → OK"
            else
              echo "::warning::This PR modifies extension SQL but does not update benchmarks/gate/. Per the release process, every release-affecting change should include a bench gate snapshot. Hygiene-only PRs (docs/CHANGELOG) may ignore this."
            fi
          else
            echo "::notice::No extension SQL changes — bench gate not required for this PR"
          fi

  smoke-recall-hybrid:
    # Quick smoke test for pgmnemo.recall_hybrid() signature stability.
    # Catches signature/output-column breaks (like "hybrid_score" → "score" bug
    # discovered 2026-05-14) before they crash bench scripts at runtime.
    # Runs on every push and PR — fast (~10s), independent of installcheck job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL 17 + pgvector
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-17 postgresql-17-pgvector postgresql-server-dev-17 build-essential
      - name: Start PG + create role/db
        run: |
          sudo pg_createcluster --start 17 main || sudo pg_ctlcluster 17 main start
          sudo -u postgres /usr/lib/postgresql/17/bin/psql -p 5433 -c "CREATE USER runner SUPERUSER PASSWORD 'runner';"
          sudo -u postgres /usr/lib/postgresql/17/bin/psql -p 5433 -c "CREATE DATABASE pgmnemo_test OWNER runner;"
      - name: Build + install extension + load hybrid opt-in
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5433
          PGDATABASE: pgmnemo_test
        run: |
          cd extension && make PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config && sudo make install PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
          /usr/lib/postgresql/17/bin/psql -c "CREATE EXTENSION pgmnemo CASCADE;"
      - name: Run smoke test
        env:
          DATABASE_URL: postgresql://runner:runner@localhost:5433/pgmnemo_test
        run: |
          python3 -m pip install --quiet psycopg2-binary
          python3 scripts/smoke_recall_hybrid.py

  compat-matrix:
    # Multi-PG-version compatibility check. PG 17 is the gate (covered by
    # installcheck above); PG 14/15/16 are continue-on-error to give visibility
    # without blocking ship while we verify older-version compatibility claims
    # in META.json + README. As of v0.4.1 the compatibility matrix is
    # aspirational — file an issue if any non-17 version fails.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [14, 15, 16]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL ${{ matrix.pg }} + pgvector
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-${{ matrix.pg }} postgresql-${{ matrix.pg }}-pgvector postgresql-server-dev-${{ matrix.pg }} build-essential
      - name: Start PG ${{ matrix.pg }}
        run: |
          sudo pg_createcluster --start ${{ matrix.pg }} main || sudo pg_ctlcluster ${{ matrix.pg }} main start
          PORT=$(sudo grep -E '^port' /etc/postgresql/${{ matrix.pg }}/main/postgresql.conf | head -1 | sed 's/[^0-9]//g')
          echo "PG_PORT=${PORT}" >> $GITHUB_ENV
          sudo -u postgres /usr/lib/postgresql/${{ matrix.pg }}/bin/psql -p ${PORT} -c "CREATE USER runner SUPERUSER PASSWORD 'runner';"
          sudo -u postgres /usr/lib/postgresql/${{ matrix.pg }}/bin/psql -p ${PORT} -c "CREATE DATABASE pgmnemo_test OWNER runner;"
      - name: Build + install extension
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: ${{ env.PG_PORT }}
          PGDATABASE: pgmnemo_test
        run: |
          cd extension && make PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config
          sudo make install PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config
      - name: CREATE EXTENSION smoke
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: ${{ env.PG_PORT }}
          PGDATABASE: pgmnemo_test
        run: /usr/lib/postgresql/${{ matrix.pg }}/bin/psql -c "CREATE EXTENSION pgmnemo CASCADE; SELECT pgmnemo.version();"

  upgrade-path-test:
    # Verify ALTER EXTENSION UPDATE chain works end-to-end on PG 17.
    # Tests every adopter-relevant upgrade path:
    #   v0.2.1 → v0.4.1  (the longest realistic upgrade Agency-style)
    #   v0.3.0 → v0.4.1
    #   v0.4.0 → v0.4.1  (the most common immediate upgrade)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL 17 + pgvector
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-17 postgresql-17-pgvector postgresql-server-dev-17 build-essential
      - name: Start PG
        run: |
          sudo pg_createcluster --start 17 main || sudo pg_ctlcluster 17 main start
          sudo -u postgres /usr/lib/postgresql/17/bin/psql -p 5433 -c "CREATE USER runner SUPERUSER PASSWORD 'runner';"
      - name: Install extension files
        run: |
          cd extension && make PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
          sudo make install PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
      - name: Test upgrade chains
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5433
        run: |
          PSQL=/usr/lib/postgresql/17/bin/psql
          # Read current default_version from control file
          TARGET_VER=$(grep '^default_version' extension/pgmnemo.control | sed "s/.*= *'//;s/'.*//")
          echo "Target version: $TARGET_VER"
          for FROM_VER in 0.2.1 0.3.0 0.4.0 0.4.1 0.5.0; do
            # Skip if no upgrade script exists from this version
            if [ ! -f "extension/pgmnemo--${FROM_VER}--${TARGET_VER}.sql" ] && [ "$FROM_VER" != "$TARGET_VER" ]; then
              # Check if there's a multi-hop path — just do a smoke check
              echo "::notice::No direct upgrade script from $FROM_VER to $TARGET_VER — skipping"
              continue
            fi
            [ "$FROM_VER" = "$TARGET_VER" ] && continue
            echo "::group::Upgrade chain from $FROM_VER → $TARGET_VER"
            DB_NAME="upgrade_test_$(echo $FROM_VER | tr . _)"
            sudo -u postgres $PSQL -p 5433 -c "DROP DATABASE IF EXISTS $DB_NAME"
            sudo -u postgres $PSQL -p 5433 -c "CREATE DATABASE $DB_NAME OWNER runner"
            $PSQL -d $DB_NAME -c "CREATE EXTENSION pgmnemo VERSION '$FROM_VER' CASCADE"
            VER=$($PSQL -d $DB_NAME -tAc "SELECT pgmnemo.version()")
            echo "  installed: $VER"
            $PSQL -d $DB_NAME -c "ALTER EXTENSION pgmnemo UPDATE TO '$TARGET_VER'"
            VER=$($PSQL -d $DB_NAME -tAc "SELECT pgmnemo.version()")
            echo "  upgraded:  $VER"
            test "$VER" = "$TARGET_VER" || { echo "FAIL: upgrade from $FROM_VER produced $VER, expected $TARGET_VER"; exit 1; }
            $PSQL -d $DB_NAME -c "SELECT version, lesson_count, mem_edge_count, hybrid_enabled, orphan_count FROM pgmnemo.stats()"
            echo "::endgroup::"
          done
          echo "✓ All upgrade paths verified to $TARGET_VER"
          # Confirm updated_at trigger + patch_count column present after upgrade
          # (regression guard: v0.10.0 inherits these from v0.9.x; verify chain)
          DB_VERIFY="updated_at_verify_$(echo $TARGET_VER | tr . _)"
          sudo -u postgres $PSQL -p 5433 -c "DROP DATABASE IF EXISTS $DB_VERIFY"
          sudo -u postgres $PSQL -p 5433 -c "CREATE DATABASE $DB_VERIFY OWNER runner"
          $PSQL -d $DB_VERIFY -c "CREATE EXTENSION pgmnemo VERSION '0.9.8' CASCADE"
          $PSQL -d $DB_VERIFY -c "ALTER EXTENSION pgmnemo UPDATE TO '$TARGET_VER'"
          PATCH_COL=$($PSQL -d $DB_VERIFY -tAc "SELECT column_name FROM information_schema.columns WHERE table_schema='pgmnemo' AND table_name='agent_lesson' AND column_name='patch_count'")
          UPDAT_COL=$($PSQL -d $DB_VERIFY -tAc "SELECT column_name FROM information_schema.columns WHERE table_schema='pgmnemo' AND table_name='agent_lesson' AND column_name='updated_at'")
          test "$PATCH_COL" = "patch_count" || { echo "FAIL: patch_count column missing after upgrade to $TARGET_VER"; exit 1; }
          test "$UPDAT_COL" = "updated_at" || { echo "FAIL: updated_at column missing after upgrade to $TARGET_VER"; exit 1; }
          echo "✓ updated_at + patch_count confirmed present at $TARGET_VER"

  clean-room-install:
    # PR-time packaging gate. Builds the REAL bundle zip (same builder the release
    # uses) and installs it into a pristine pgvector/pgvector:pg17 container via
    # the DOCUMENTED path from docs/INSTALL.md, then CREATE EXTENSION + version
    # assert. This is the gate that was MISSING when v0.7.1 shipped a double-nested
    # extension/extension/ dist that no SQL-source installcheck could catch.
    # Docker is preinstalled on GitHub-hosted ubuntu runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version from control file
        id: version
        run: |
          V=$(grep '^default_version' extension/pgmnemo.control | sed "s/.*= *'//;s/'.*//")
          echo "VERSION=$V" >> "$GITHUB_OUTPUT"
          echo "default_version=$V"
      - name: Build the REAL bundle (single builder)
        run: scripts/build_pgxn_bundle.sh "${{ steps.version.outputs.VERSION }}"
      - name: Clean-room install the BUILT zip
        run: scripts/clean_room_install_check.sh "${{ steps.version.outputs.VERSION }}"
