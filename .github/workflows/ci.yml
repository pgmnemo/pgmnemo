name: CI
on: [push, pull_request]
jobs:
  installcheck:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-server-dev-17 build-essential
      - name: Build extension
        run: cd extension && make
      - name: Install extension
        run: cd extension && sudo make install
      - name: Run installcheck
        env:
          PGUSER: postgres
          PGPASSWORD: postgres
          PGHOST: localhost
          PGPORT: 5432
        run: cd extension && make installcheck
