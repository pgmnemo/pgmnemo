name: CI
on: [push, pull_request]
jobs:
  installcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL 17 + pgvector + build deps
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-17 postgresql-17-pgvector postgresql-server-dev-17 build-essential
      - name: Start PostgreSQL and create role/database
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER runner SUPERUSER PASSWORD 'runner';"
          sudo -u postgres psql -c "CREATE DATABASE pgmnemo_test OWNER runner;"
      - name: Build extension
        run: cd extension && make
      - name: Install extension
        run: cd extension && sudo make install
      - name: Verify extension loads
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: pgmnemo_test
        run: psql -c "CREATE EXTENSION pgmnemo CASCADE;"
      - name: Run installcheck
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: pgmnemo_test
        run: cd extension && make installcheck
