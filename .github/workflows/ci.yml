name: CI
on: [push, pull_request]
permissions:
  contents: write
jobs:
  installcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL 17 + pgvector + build deps
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-17 postgresql-17-pgvector postgresql-server-dev-17 build-essential
      - name: Start PostgreSQL 17 and create role/database
        run: |
          sudo pg_createcluster --start 17 main || sudo pg_ctlcluster 17 main start
          sudo -u postgres /usr/lib/postgresql/17/bin/psql -p 5433 -c "CREATE USER runner SUPERUSER PASSWORD 'runner';"
          sudo -u postgres /usr/lib/postgresql/17/bin/psql -p 5433 -c "CREATE DATABASE pgmnemo_test OWNER runner;"
      - name: Build extension
        run: cd extension && make PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
      - name: Install extension
        run: cd extension && sudo make install PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
      - name: Verify extension loads
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5433
          PGDATABASE: pgmnemo_test
        run: /usr/lib/postgresql/17/bin/psql -c "CREATE EXTENSION pgmnemo CASCADE;"
      - name: Run installcheck
        id: installcheck
        continue-on-error: true
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5433
          PGDATABASE: pgmnemo_test
        run: cd extension && make installcheck PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
      - name: Update expected files from PG 17 output (baseline reset)
        if: steps.installcheck.outcome == 'failure' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if ls extension/results/*.out 2>/dev/null; then
            cp extension/results/*.out extension/expected/
            git config user.email "ci@pgmnemo.dev"
            git config user.name "pgmnemo CI"
            git add extension/expected/
            if ! git diff --staged --quiet; then
              git commit -m "test: update pg_regress expected output for PG 17 [skip ci]"
              git push
              echo "BASELINES_UPDATED=true" >> $GITHUB_ENV
            fi
          fi
      - name: Re-run installcheck after baseline update
        if: env.BASELINES_UPDATED == 'true'
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5433
          PGDATABASE: pgmnemo_test
        run: cd extension && make installcheck PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
      - name: Fail if installcheck failed and no baseline update
        if: steps.installcheck.outcome == 'failure' && env.BASELINES_UPDATED != 'true'
        run: |
          cat extension/regression.diffs || true
          exit 1

  bench-gate-presence:
    # PR-time check: if the PR modifies recall_lessons() or migration scripts but
    # does not include a benchmarks/gate/v*.json update, warn the author.
    # This is a soft check on CI (push to main); the hard gate runs on tag push
    # (release.yml).
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect recall-affecting changes
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only origin/main HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE 'extension/pgmnemo--.*\.sql$|extension/pgmnemo\.control$'; then
            if echo "$CHANGED" | grep -qE '^benchmarks/gate/v.*\.json$'; then
              echo "::notice::recall-affecting change + bench gate file updated → OK"
            else
              echo "::warning::This PR modifies extension SQL but does not update benchmarks/gate/. Per docs/WORKFLOW.md §2.2, every release-affecting change should include a bench gate snapshot. Hygiene-only PRs (docs/CHANGELOG) may ignore this."
            fi
          else
            echo "::notice::No extension SQL changes — bench gate not required for this PR"
          fi

  smoke-recall-hybrid:
    # Quick smoke test for pgmnemo.recall_hybrid() signature stability.
    # Catches signature/output-column breaks (like "hybrid_score" → "score" bug
    # discovered 2026-05-14) before they crash bench scripts at runtime.
    # Runs on every push and PR — fast (~10s), independent of installcheck job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL 17 + pgvector
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-17 postgresql-17-pgvector postgresql-server-dev-17 build-essential
      - name: Start PG + create role/db
        run: |
          sudo pg_createcluster --start 17 main || sudo pg_ctlcluster 17 main start
          sudo -u postgres /usr/lib/postgresql/17/bin/psql -p 5433 -c "CREATE USER runner SUPERUSER PASSWORD 'runner';"
          sudo -u postgres /usr/lib/postgresql/17/bin/psql -p 5433 -c "CREATE DATABASE pgmnemo_test OWNER runner;"
      - name: Build + install extension + load hybrid opt-in
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5433
          PGDATABASE: pgmnemo_test
        run: |
          cd extension && make PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config && sudo make install PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
          /usr/lib/postgresql/17/bin/psql -c "CREATE EXTENSION pgmnemo CASCADE;"
          /usr/lib/postgresql/17/bin/psql -f pgmnemo--0.2.1--0.2.2-hybrid.sql
      - name: Run smoke test
        env:
          DATABASE_URL: postgresql://runner:runner@localhost:5433/pgmnemo_test
        run: |
          python3 -m pip install --quiet psycopg2-binary
          python3 scripts/smoke_recall_hybrid.py

  compat-matrix:
    # Multi-PG-version compatibility check. PG 17 is the gate (covered by
    # installcheck above); PG 14/15/16 are continue-on-error to give visibility
    # without blocking ship while we verify older-version compatibility claims
    # in META.json + README. As of v0.4.1 the compatibility matrix is
    # aspirational — file an issue if any non-17 version fails.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [14, 15, 16]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL ${{ matrix.pg }} + pgvector
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-${{ matrix.pg }} postgresql-${{ matrix.pg }}-pgvector postgresql-server-dev-${{ matrix.pg }} build-essential
      - name: Start PG ${{ matrix.pg }}
        run: |
          sudo pg_createcluster --start ${{ matrix.pg }} main || sudo pg_ctlcluster ${{ matrix.pg }} main start
          PORT=$(sudo grep -E '^port' /etc/postgresql/${{ matrix.pg }}/main/postgresql.conf | head -1 | sed 's/[^0-9]//g')
          echo "PG_PORT=${PORT}" >> $GITHUB_ENV
          sudo -u postgres /usr/lib/postgresql/${{ matrix.pg }}/bin/psql -p ${PORT} -c "CREATE USER runner SUPERUSER PASSWORD 'runner';"
          sudo -u postgres /usr/lib/postgresql/${{ matrix.pg }}/bin/psql -p ${PORT} -c "CREATE DATABASE pgmnemo_test OWNER runner;"
      - name: Build + install extension
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: ${{ env.PG_PORT }}
          PGDATABASE: pgmnemo_test
        run: |
          cd extension && make PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config
          sudo make install PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config
      - name: CREATE EXTENSION smoke
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: ${{ env.PG_PORT }}
          PGDATABASE: pgmnemo_test
        run: /usr/lib/postgresql/${{ matrix.pg }}/bin/psql -c "CREATE EXTENSION pgmnemo CASCADE; SELECT pgmnemo.version();"

  upgrade-path-test:
    # Verify ALTER EXTENSION UPDATE chain works end-to-end on PG 17.
    # Tests every adopter-relevant upgrade path:
    #   v0.2.1 → v0.4.1  (the longest realistic upgrade Agency-style)
    #   v0.3.0 → v0.4.1
    #   v0.4.0 → v0.4.1  (the most common immediate upgrade)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL 17 + pgvector
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-17 postgresql-17-pgvector postgresql-server-dev-17 build-essential
      - name: Start PG
        run: |
          sudo pg_createcluster --start 17 main || sudo pg_ctlcluster 17 main start
          sudo -u postgres /usr/lib/postgresql/17/bin/psql -p 5433 -c "CREATE USER runner SUPERUSER PASSWORD 'runner';"
      - name: Install extension files
        run: |
          cd extension && make PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
          sudo make install PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config
      - name: Test upgrade chains
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5433
        run: |
          PSQL=/usr/lib/postgresql/17/bin/psql
          for FROM_VER in 0.2.1 0.3.0 0.4.0; do
            echo "::group::Upgrade chain from $FROM_VER → 0.4.1"
            sudo -u postgres $PSQL -p 5433 -c "DROP DATABASE IF EXISTS upgrade_test_$(echo $FROM_VER | tr . _)"
            sudo -u postgres $PSQL -p 5433 -c "CREATE DATABASE upgrade_test_$(echo $FROM_VER | tr . _) OWNER runner"
            DB=upgrade_test_$(echo $FROM_VER | tr . _)
            $PSQL -d $DB -c "CREATE EXTENSION pgmnemo VERSION '$FROM_VER' CASCADE"
            VER=$($PSQL -d $DB -tAc "SELECT pgmnemo.version()")
            echo "  installed: $VER"
            $PSQL -d $DB -c "ALTER EXTENSION pgmnemo UPDATE TO '0.4.1'"
            VER=$($PSQL -d $DB -tAc "SELECT pgmnemo.version()")
            echo "  upgraded:  $VER"
            test "$VER" = "0.4.1" || { echo "FAIL: upgrade from $FROM_VER produced $VER"; exit 1; }
            $PSQL -d $DB -c "SELECT version, lesson_count, mem_edge_count, hybrid_enabled, orphan_count FROM pgmnemo.stats()"
            echo "::endgroup::"
          done
          echo "✓ All 3 upgrade paths verified"
