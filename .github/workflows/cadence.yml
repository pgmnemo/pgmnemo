name: Weekly Cadence Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Mon — hygiene
    - cron: '0 9 * * 3'  # Wed — proof
    - cron: '0 9 * * 5'  # Fri — external
  workflow_dispatch:
    inputs:
      day:
        description: 'mon|wed|fri|all'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  cadence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve day
        id: day
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "day=${{ github.event.inputs.day }}" >> $GITHUB_OUTPUT
          else
            case "$(date +%u)" in
              1) echo "day=mon" >> $GITHUB_OUTPUT ;;
              3) echo "day=wed" >> $GITHUB_OUTPUT ;;
              5) echo "day=fri" >> $GITHUB_OUTPUT ;;
              *) echo "day=all" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Run cadence checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/cadence_check.sh
          scripts/cadence_check.sh --day ${{ steps.day.outputs.day }} || true

      - name: Commit report
        run: |
          git config user.email "ci@pgmnemo.dev"
          git config user.name "pgmnemo CI"
          git add spec/reports/CADENCE_*.md
          if ! git diff --staged --quiet; then
            git commit -m "chore(cadence): ${{ steps.day.outputs.day }} $(date +%Y-%m-%d) [skip ci]"
            git push
          fi
