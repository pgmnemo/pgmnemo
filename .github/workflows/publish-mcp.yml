name: Publish pgmnemo-mcp to PyPI (manual)

# Standalone manual publish workflow.
# Automated publish on tag is handled by release.yml (publish-mcp job).
# Uses OIDC trusted publishing — no PYPI_TOKEN secret needed.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (must match pgmnemo_mcp/pyproject.toml)'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Build package
        working-directory: pgmnemo_mcp
        run: python -m build

      - name: Verify version matches input
        run: |
          PKG_VER=$(python3 -c "
          import sys
          sys.path.insert(0, 'pgmnemo_mcp')
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('pgmnemo_mcp/pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          INPUT_VER="${{ github.event.inputs.version }}"
          if [ "$PKG_VER" != "$INPUT_VER" ]; then
            echo "::error::pyproject.toml version ($PKG_VER) != input ($INPUT_VER)"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pgmnemo_mcp/dist/
          skip-existing: true
