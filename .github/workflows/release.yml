name: Release

on:
  push:
    tags:
      - 'v*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.5.1)'
        required: true
      bench_override:
        description: 'Skip bench-gate check'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write  # for notify-failure job

jobs:
  # ─── Job 0: pre-flight version consistency + artifact checks ──────────────
  # Catches operator mistakes (forgot to bump a version, gate file missing,
  # CHANGELOG entry missing) BEFORE we try to publish anything.
  pre-flight:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check bench-gate file present
        run: |
          V=${{ steps.version.outputs.VERSION }}
          OVERRIDE="${{ github.event.inputs.bench_override }}"
          if [ -f "benchmarks/gate/v${V}.json" ]; then
            echo "✓ benchmarks/gate/v${V}.json present"
          elif [ "$OVERRIDE" = "true" ] || echo "${{ github.event.head_commit.message }}" | grep -q '\[bench-gate-override\]'; then
            echo "⚠ bench-gate bypassed via override"
          else
            echo "::error::benchmarks/gate/v${V}.json missing. Create with analytical or empirical proof, or use [bench-gate-override] in commit message."
            exit 1
          fi

      - name: Check pgmnemo.control default_version matches tag
        run: |
          V=${{ steps.version.outputs.VERSION }}
          CTRL=$(grep -E "^default_version" extension/pgmnemo.control | sed -E "s/.*'([^']+)'.*/\1/")
          if [ "$CTRL" != "$V" ]; then
            echo "::error::extension/pgmnemo.control default_version='$CTRL' does not match tag v$V. Bump default_version in pgmnemo.control before tagging."
            exit 1
          fi
          echo "✓ pgmnemo.control default_version=$CTRL matches tag"

      - name: Check extension/pgmnemo--<X>.sql fresh-install script present
        run: |
          V=${{ steps.version.outputs.VERSION }}
          if [ ! -f "extension/pgmnemo--${V}.sql" ]; then
            echo "::error::extension/pgmnemo--${V}.sql missing. PostgreSQL needs a fresh-install script (in addition to the update path) for CREATE EXTENSION to work on a clean database. Build via: cat extension/pgmnemo--<prev>.sql extension/pgmnemo--<prev>--${V}.sql > extension/pgmnemo--${V}.sql && add to extension/Makefile DATA list."
            exit 1
          fi
          if ! grep -q "pgmnemo--${V}.sql" extension/Makefile; then
            echo "::error::extension/Makefile DATA list does not include pgmnemo--${V}.sql. Add it so 'make install' copies the fresh-install script to PostgreSQL's extension/ dir."
            exit 1
          fi
          echo "✓ extension/pgmnemo--${V}.sql present and in Makefile DATA"

      - name: Check META.json version matches tag
        run: |
          V=${{ steps.version.outputs.VERSION }}
          META=$(python3 -c "import json; print(json.load(open('META.json'))['version'])")
          if [ "$META" != "$V" ]; then
            echo "::error::META.json version='$META' does not match tag v$V. Bump META.json version before tagging."
            exit 1
          fi
          echo "✓ META.json version=$META matches tag"

      - name: Check pgmnemo_mcp pyproject version matches tag
        run: |
          V=${{ steps.version.outputs.VERSION }}
          PYPI_VER=$(grep -E "^version" pgmnemo_mcp/pyproject.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          # Allow .postN suffix variants (e.g. 0.6.0.post1 for re-release of metadata-only fix)
          BASE_VER="${PYPI_VER%%.post*}"
          if [ "$BASE_VER" != "$V" ]; then
            echo "::error::pgmnemo_mcp/pyproject.toml version='$PYPI_VER' base does not match tag v$V. Bump pgmnemo_mcp/pyproject.toml before tagging."
            exit 1
          fi
          echo "✓ pgmnemo_mcp version=$PYPI_VER matches tag (base=$BASE_VER)"

      - name: Check CHANGELOG entry exists
        run: |
          V=${{ steps.version.outputs.VERSION }}
          if ! grep -qE "^## \[$V\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing entry '## [$V]'. Add a CHANGELOG entry for this version before tagging."
            exit 1
          fi
          # Verify entry is non-trivial: count chars between this version's heading
          # and the next ## heading (exclusive). Use python for correct range semantics —
          # awk's range operator is ambiguous when start and end patterns overlap.
          ENTRY=$(python3 -c "
          import re
          v = '$V'
          c = open('CHANGELOG.md').read()
          m = re.search(rf'^## \[{re.escape(v)}\][^\n]*\n(.*?)(?=^## \[|\Z)', c, re.MULTILINE|re.DOTALL)
          print(len(m.group(1).strip()) if m else 0)
          ")
          if [ "$ENTRY" -lt 200 ]; then
            echo "::error::CHANGELOG.md entry for [$V] is suspiciously short ($ENTRY chars). Add release notes."
            exit 1
          fi
          echo "✓ CHANGELOG entry for [$V] present ($ENTRY chars)"

      - name: Check README version badge matches tag
        run: |
          V=${{ steps.version.outputs.VERSION }}
          if ! grep -qE "badge/version-${V//./\\.}" README.md; then
            echo "::warning::README.md version badge does not match v$V. Consider bumping the badge URL (not blocking)."
          else
            echo "✓ README version badge matches v$V"
          fi

  # ─── Job 1: pg_regress installcheck ────────────────────────────────────────
  installcheck:
    needs: pre-flight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL 17 + pgvector + build deps
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-17 postgresql-17-pgvector postgresql-server-dev-17 build-essential

      - name: Start PostgreSQL 17 and create role/database
        run: |
          sudo pg_createcluster --start 17 main || sudo pg_ctlcluster 17 main start
          sudo -u postgres /usr/lib/postgresql/17/bin/psql -p 5433 -c "CREATE USER runner SUPERUSER PASSWORD 'runner';"
          sudo -u postgres /usr/lib/postgresql/17/bin/psql -p 5433 -c "CREATE DATABASE pgmnemo_test OWNER runner;"

      - name: Build and install extension
        run: cd extension && make PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config && sudo make install PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config

      - name: Verify extension loads
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5433
          PGDATABASE: pgmnemo_test
        run: /usr/lib/postgresql/17/bin/psql -c "CREATE EXTENSION pgmnemo CASCADE;"

      - name: Run installcheck
        env:
          PGUSER: runner
          PGPASSWORD: runner
          PGHOST: localhost
          PGPORT: 5433
          PGDATABASE: pgmnemo_test
        run: cd extension && make installcheck PG_CONFIG=/usr/lib/postgresql/17/bin/pg_config

      - name: Smoke test recall_hybrid signature
        env:
          DATABASE_URL: postgresql://runner:runner@localhost:5433/pgmnemo_test
        run: |
          python3 -m pip install --quiet psycopg2-binary
          python3 scripts/smoke_recall_hybrid.py

      - name: Upload regression diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-diffs
          path: |
            extension/regression.diffs
            extension/results/

  # ─── Job 2: bench-gate ─────────────────────────────────────────────────────
  bench-gate:
    needs: pre-flight
    runs-on: ubuntu-latest
    outputs:
      bench_pass: ${{ steps.gate.outputs.bench_pass }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check bench-gate file exists
        id: gate
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          GATE="benchmarks/gate/v${VERSION}.json"
          OVERRIDE="${{ github.event.inputs.bench_override }}"
          if [ ! -f "$GATE" ]; then
            if [ "$OVERRIDE" = "true" ] || echo "${{ github.event.head_commit.message }}" | grep -q '\[bench-gate-override\]'; then
              echo "::warning::bench-gate bypassed"
              echo "bench_pass=override" >> "$GITHUB_OUTPUT"
            else
              echo "::error::$GATE missing. Run benchmarks and commit the gate file, or use [bench-gate-override] in commit message."
              exit 1
            fi
          else
            echo "bench_pass=true" >> "$GITHUB_OUTPUT"
            echo "Gate file $GATE found — Δ=0 or previously confirmed."
          fi

  # ─── Job 3: build PGXN bundle + create GitHub Release ────────────────────
  release:
    needs: [installcheck, bench-gate]
    runs-on: ubuntu-latest
    outputs:
      bundle: ${{ steps.bundle.outputs.bundle }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build PGXN bundle
        id: bundle
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          BUNDLE="pgmnemo-${VERSION}.zip"
          mkdir -p "pgmnemo-${VERSION}/extension"
          cp -r extension/ "pgmnemo-${VERSION}/extension/"
          cp Makefile README.md LICENSE CHANGELOG.md META.json "pgmnemo-${VERSION}/"
          zip -r "${BUNDLE}" "pgmnemo-${VERSION}/"
          echo "bundle=${BUNDLE}" >> "$GITHUB_OUTPUT"
          echo "Built ${BUNDLE} ($(wc -c < ${BUNDLE}) bytes)"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          python3 - <<'EOF'
          import re, os
          with open('CHANGELOG.md') as f:
              content = f.read()
          version = os.environ.get('VERSION', '')
          # Extract section for this version
          pattern = rf'## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)'
          m = re.search(pattern, content, re.DOTALL)
          notes = m.group(1).strip() if m else f'Release v{version}'
          with open('/tmp/release_notes.md', 'w') as f:
              f.write(notes)
          print(f"Extracted {len(notes)} chars of release notes")
          EOF
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: pgmnemo v${{ steps.version.outputs.VERSION }}
          body_path: /tmp/release_notes.md
          files: ${{ steps.bundle.outputs.bundle }}
          make_latest: true

      - name: Upload to PGXN
        if: ${{ secrets.PGXN_USERNAME != '' }}
        env:
          PGXN_USERNAME: ${{ secrets.PGXN_USERNAME }}
          PGXN_PASSWORD: ${{ secrets.PGXN_PASSWORD }}
        run: |
          # PGXN Manager returns HTTP 303 (See Other) on successful upload,
          # redirecting to the release page. Treat 303 as success.
          HTTP_CODE=$(curl -s -o /tmp/pgxn_response.txt -w "%{http_code}" \
            --http1.1 \
            -X POST https://manager.pgxn.org/upload \
            -u "${PGXN_USERNAME}:${PGXN_PASSWORD}" \
            -F "archive=@${{ steps.bundle.outputs.bundle }}")
          cat /tmp/pgxn_response.txt
          if [ "$HTTP_CODE" -eq 303 ] || { [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; }; then
            echo "PGXN upload succeeded (HTTP $HTTP_CODE)"
          elif [ "$HTTP_CODE" -eq 409 ]; then
            echo "::notice::PGXN upload skipped — this version is already published (HTTP 409)"
          else
            echo "::error::PGXN upload failed (HTTP $HTTP_CODE)"
            exit 1
          fi

  # ─── Job 4: publish pgmnemo-mcp to PyPI ────────────────────────────────────
  # Two auth paths:
  #   Path A — OIDC Trusted Publisher (no secret needed, more secure):
  #     Configure once at pypi.org/manage/account/publishing/ → "Add pending publisher"
  #     Fields: project=pgmnemo-mcp, owner=pgmnemo, repo=pgmnemo,
  #             workflow=release.yml, environment=pypi
  #   Path B — API token (classic): add PYPI_API_TOKEN secret to this GitHub repo.
  #     When PYPI_API_TOKEN is set it overrides OIDC automatically.
  publish-mcp:
    needs: [installcheck, bench-gate]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Build package
        working-directory: pgmnemo_mcp
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pgmnemo_mcp/dist/
          skip-existing: true
          # Path B: if PYPI_API_TOKEN secret exists it takes priority over OIDC.
          # Path A: leave empty — OIDC token used automatically.
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ─── Job 5: PyPI smoke test (catches v0.5.2-class empty-wheel bugs) ───────
  smoke-pypi:
    needs: [pre-flight, publish-mcp]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Wait for PyPI index propagation
        run: sleep 45

      - name: Install pgmnemo-mcp from PyPI in clean venv
        run: |
          V=${{ needs.pre-flight.outputs.version }}
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --quiet "pgmnemo-mcp==${V}" || {
            echo "::error::pip install pgmnemo-mcp==${V} failed — package not on PyPI or wheel broken"
            exit 1
          }
          echo "✓ pip install pgmnemo-mcp==${V} succeeded"

      - name: Verify package is non-empty + entry point importable
        run: |
          V=${{ needs.pre-flight.outputs.version }}
          /tmp/smoke/bin/python -c "
          import pgmnemo_mcp
          import pgmnemo_mcp.server
          assert hasattr(pgmnemo_mcp.server, 'run'), 'pgmnemo_mcp.server.run entry point missing'
          print('✓ pgmnemo_mcp importable, server.run present')
          " || {
            echo "::error::pgmnemo-mcp ${V} installed but import failed — wheel may be empty (recurrence of v0.5.2 bug #32)"
            exit 1
          }

      - name: Verify console script registered
        run: |
          test -x /tmp/smoke/bin/pgmnemo-mcp || {
            echo "::error::pgmnemo-mcp console script not registered in PATH"
            exit 1
          }
          echo "✓ pgmnemo-mcp script available at /tmp/smoke/bin/pgmnemo-mcp"

  # ─── Job 6: PGXN smoke test ────────────────────────────────────────────────
  smoke-pgxn:
    needs: [pre-flight, release]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for PGXN propagation
        run: sleep 60

      - name: HEAD check PGXN release URL
        run: |
          V=${{ needs.pre-flight.outputs.version }}
          URL="https://api.pgxn.org/dist/pgmnemo/${V}/pgmnemo-${V}.zip"
          # PGXN can take a few minutes to propagate — retry up to 3x with backoff
          for i in 1 2 3; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -I "$URL")
            if [ "$CODE" = "200" ]; then
              echo "✓ PGXN: $URL (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $CODE — retrying in 30s"
            sleep 30
          done
          echo "::warning::PGXN release not reachable at $URL after 3 attempts. Check manager.pgxn.org for upload status."
          # Don't fail — PGXN propagation can be slow, and 409 (already uploaded) is reported as success in release job

  # ─── Job 7: notify-telegram (announce release to community group) ────────
  # Sends short HTML-formatted message to pgmnemo Telegram group on full success.
  # Requires repo secrets: TG_BOT_TOKEN, TG_CHAT_ID.
  # Fail-open: if secrets missing, step is skipped (does NOT fail the workflow).
  # Bot must be added to the target group with permission to post.
  notify-telegram:
    needs: [pre-flight, release, publish-mcp, smoke-pypi, smoke-pgxn]
    runs-on: ubuntu-latest
    if: ${{ secrets.TG_BOT_TOKEN != '' && secrets.TG_CHAT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Telegram message from release notes file (or fallback)
        id: msg
        env:
          VERSION: ${{ needs.pre-flight.outputs.version }}
        run: |
          python3 - <<'PY' > /tmp/tg_body.txt
          import os, re, urllib.parse
          v = os.environ['VERSION']

          # Path A: maintainer-authored Telegram-specific release notes (preferred)
          tg_file = f"docs/release_notes/v{v}_telegram.md"
          if os.path.exists(tg_file):
              body = open(tg_file).read().strip()
              print(body, end='')
              exit(0)

          # Path B: fallback — extract Theme + first paragraph of CHANGELOG entry
          # Produces a short generic notification that points at CHANGELOG for details.
          c = open('CHANGELOG.md').read()
          m = re.search(rf'^## \[{re.escape(v)}\][^\n]*\n(.*?)(?=^## \[|\Z)', c, re.M | re.S)
          theme = ''
          if m:
              tm = re.search(r'### Theme\s*\n+([^\n#]+(?:\n[^\n#]+)*)', m.group(1))
              if tm:
                  theme = ' '.join(tm.group(1).split()).strip()
          fallback = f"""🚀 <b>pgmnemo v{v} released</b>

{theme if theme else 'See CHANGELOG for details.'}

For maintainers: add <code>docs/release_notes/v{v}_telegram.md</code> next time to send a more detailed announcement."""
          print(fallback, end='')
          PY
          # Append install + links (always present, machine-generated)
          cat >> /tmp/tg_body.txt <<EOF


<b>Install:</b>
<code>psql -c "ALTER EXTENSION pgmnemo UPDATE TO '${VERSION}';"</code>

<b>Links:</b>
📦 <a href="https://github.com/pgmnemo/pgmnemo/releases/tag/v${VERSION}">GitHub Release</a>
🐘 <a href="https://pgxn.org/dist/pgmnemo/${VERSION}/">PGXN</a>
🐍 <a href="https://pypi.org/project/pgmnemo-mcp/${VERSION}/">pgmnemo-mcp on PyPI</a>
📋 <a href="https://github.com/pgmnemo/pgmnemo/blob/v${VERSION}/CHANGELOG.md">Full CHANGELOG</a>
EOF
          # Telegram has 4096-char limit; truncate if longer
          BODY_SIZE=$(wc -c < /tmp/tg_body.txt)
          if [ "$BODY_SIZE" -gt 4000 ]; then
            echo "::warning::Telegram body $BODY_SIZE chars exceeds 4000 safe limit — truncating"
            head -c 3900 /tmp/tg_body.txt > /tmp/tg_body_truncated.txt
            echo "…" >> /tmp/tg_body_truncated.txt
            mv /tmp/tg_body_truncated.txt /tmp/tg_body.txt
          fi
          echo "Body length: $(wc -c < /tmp/tg_body.txt) chars"

      - name: Send Telegram notification
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text@/tmp/tg_body.txt")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ Telegram notification sent"
          else
            echo "::warning::Telegram notification failed (HTTP $HTTP_CODE): $BODY"
            # Non-blocking — release already succeeded
          fi

  # ─── Job 8: notify-failure (auto-open issue on any failed release job) ────
  notify-failure:
    if: failure()
    needs: [pre-flight, installcheck, bench-gate, release, publish-mcp, smoke-pypi, smoke-pgxn, notify-telegram]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release-failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.pre-flight.outputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TITLE="release-failure: v${VERSION:-unknown} workflow failed"
          BODY=$(cat <<EOF
          **Workflow:** release.yml
          **Tag:** v${VERSION:-unknown}
          **Run:** ${RUN_URL}
          **Triggered by:** ${{ github.actor }}
          **Event:** ${{ github.event_name }}

          One or more jobs in the release workflow failed. Common causes:

          - **pre-flight failure** → version mismatch between \`pgmnemo.control\` / \`META.json\` / \`pgmnemo_mcp/pyproject.toml\` / \`CHANGELOG.md\`. Check the pre-flight job log for the specific assertion.
          - **installcheck failure** → \`pg_regress\` regression diffs uploaded as artifact \`regression-diffs\` on this run.
          - **bench-gate failure** → \`benchmarks/gate/v${VERSION}.json\` missing or invalid.
          - **release / PGXN upload failure** → \`PGXN_USERNAME\` / \`PGXN_PASSWORD\` secrets unset, or manager.pgxn.org rejected the bundle.
          - **publish-mcp / PyPI failure** → OIDC trusted publisher not configured (see pypi.org/manage/account/publishing/), or \`PYPI_API_TOKEN\` secret invalid.
          - **smoke-pypi failure** → \`pip install pgmnemo-mcp==${VERSION}\` succeeded but import broke. Check for empty-wheel regression (#32 class).
          - **smoke-pgxn failure** → typically PGXN propagation delay, treated as warning. If it persists >10 min, investigate manually.

          ### Recovery steps

          1. Fix the underlying issue (likely a version mismatch or missing artifact)
          2. Delete and recreate the tag: \`git tag -d v${VERSION} && git tag -a v${VERSION} -m '...' && git push origin v${VERSION} --force\`
          3. Re-run will trigger automatically on the new tag push.

          /label release-failure
          EOF
          )
          gh issue create \
            --title "$TITLE" \
            --body "$BODY" \
            --label release-failure \
            --label automated || {
            echo "::warning::Could not auto-create issue. Check manually: $RUN_URL"
          }
