document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

yle: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"74058648-ebe3-4d66-9e95-7c09aa880e98\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"a1957455-7c42-45e1-9f5a-cec3dd68ad0d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<link rel=\"icon\" type=\"image/svg+xml\" href=\"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23aac8ff'/%3E%3Cstop offset='1' stop-color='%23ffffff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='4' y='4' width='56' height='56' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='42' font-family='ui-monospace,monospace' font-size='28' font-weight='800' fill='%23050810' text-anchor='middle' letter-spacing='-1'%3Epg%3C/text%3E%3C/svg%3E\">\n<style>\n/* ============ TOKENS ============ */\n:root{\n  --bg-deep:#050810;\n  --bg-elev:#0a0e1c;\n  --bg-card:#0d1124;\n  --bg-sunk:#020410;\n  --border-dim:#1a2238;\n  --border-glow:#2d3a64;\n  --text-main:#e8edf6;\n  --text-dim:#7a8aa8;\n  --text-faint:#4a5470;\n  --accent:#aac8ff;\n  --accent-glow:rgba(170,200,255,.35);\n  --accent-tint:rgba(170,200,255,.04);\n  --positive:#6dd9b3;\n  --warning:#f5b572;\n  --announce:#4a6eff;\n  --max:1200px;\n  --tab-max:1080px;\n}\n\n/* ============ RESET ============ */\n*,*::before,*::after{box-sizing:border-box;}\nhtml{scroll-behavior:smooth;}\nbody{\n  margin:0;\n  font-family:'JetBrains Mono', ui-monospace, 'Cascadia Code', 'Menlo', monospace;\n  font-weight:400;\n  font-size:15px;\n  line-height:1.7;\n  color:var(--text-main);\n  background:var(--bg-deep);\n  -webkit-font-smoothing:antialiased;\n  font-variant-numeric:tabular-nums;\n  overflow-x:hidden;\n}\na{color:inherit;text-decoration:none;}\nbutton{font-family:inherit;cursor:pointer;}\n\n/* ============ FOCUS ============ */\na:focus-visible,button:focus-visible{\n  outline:1px solid var(--accent);\n  outline-offset:3px;\n  border-radius:4px;\n}\n\n/* ============ SKIP ============ */\n.skip{\n  position:absolute;left:-9999px;top:0;\n  background:var(--accent);color:var(--bg-deep);\n  padding:.5rem 1rem;border-radius:6px;z-index:9999;\n  font-size:.8rem;\n}\n.skip:focus{left:1rem;top:1rem;}\n\n/* ============ TYPE ============ */\nh1,h2,h3,h4,h5{\n  font-family:'JetBrains Mono', ui-monospace, monospace;\n  font-weight:700;\n  letter-spacing:-0.02em;\n  line-height:1.1;\n  color:var(--text-main);\n  margin:0;\n}\n\n.tag{\n  display:inline-flex;align-items:center;gap:.5ch;\n  font-size:.72rem;\n  font-weight:500;\n  letter-spacing:.04em;\n  text-transform:uppercase;\n  color:var(--accent);\n}\n.tag::before{content:\"( ●\";color:var(--accent);}\n.tag::after{content:\")\";color:var(--accent);}\n\n.eyebrow{\n  display:inline-block;\n  font-size:.72rem;\n  font-weight:500;\n  letter-spacing:.06em;\n  text-transform:uppercase;\n  color:var(--accent);\n  margin-bottom:1.25rem;\n}\n\n.section-head h2{\n  font-size:clamp(1.5rem,3.2vw,2.1rem);\n  letter-spacing:-0.025em;\n  margin-bottom:1rem;\n  max-width:24ch;\n}\n.section-head p{\n  color:var(--text-dim);\n  max-width:680px;\n  font-size:.92rem;\n  margin:0;\n}\n\n/* ============ LAYOUT ============ */\nsection{\n  padding:6rem 1.5rem;\n  position:relative;\n  scroll-margin-top:140px;\n}\n.container{max-width:var(--max);margin:0 auto;}\n.section-head{margin-bottom:2.5rem;}\n\n/* ============ ANNOUNCEMENT BAR ============ */\n.announce{\n  background:var(--announce);\n  color:#fff;\n  padding:.7rem 1.5rem;\n  font-size:.78rem;\n  font-weight:500;\n  text-align:center;\n  box-shadow:0 1px 0 rgba(0,0,0,.4);\n  position:relative;z-index:101;\n}\n.announce-inner{\n  max-width:var(--max);margin:0 auto;\n  display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap;\n}\n.announce a{\n  text-decoration:underline;\n  text-underline-offset:3px;\n  text-decoration-color:rgba(255,255,255,.4);\n  transition:text-decoration-color 150ms ease;\n}\n.announce a:hover{text-decoration-color:#fff;}\n.announce .sep{opacity:.4;}\n\n/* ============ NAV ============ */\n.nav{\n  position:sticky;top:0;\n  background:rgba(5,8,16,0.75);\n  backdrop-filter:blur(16px);\n  -webkit-backdrop-filter:blur(16px);\n  z-index:100;\n  border-bottom:1px solid var(--border-dim);\n}\n.nav-inner{\n  max-width:var(--max);\n  margin:0 auto;\n  height:64px;\n  padding:0 1.5rem;\n  display:flex;align-items:center;justify-content:space-between;gap:2rem;\n}\n.logo{\n  display:flex;align-items:center;gap:.65rem;\n  font-weight:700;font-size:.92rem;\n  color:var(--text-main);letter-spacing:-.02em;\n}\n.logo-mark{\n  width:24px;height:24px;border-radius:6px;\n  background:linear-gradient(135deg,var(--accent),#ffffff);\n  position:relative;\n  display:flex;align-items:center;justify-content:center;\n  font-size:.62rem;font-weight:800;color:var(--bg-deep);\n  letter-spacing:-.04em;\n}\n.logo-mark::before{content:\"pg\";}\n.nav-links{\n  display:flex;gap:1.75rem;align-items:center;\n  font-size:.82rem;color:var(--text-dim);font-weight:500;\n}\n.nav-links a{transition:color 150ms ease;}\n.nav-links a:hover{color:var(--text-main);}\n.nav-right{display:flex;align-items:center;gap:.65rem;}\n.nav-cta{\n  background:var(--text-main);\n  color:var(--bg-deep);\n  padding:.55rem 1rem;\n  border-radius:10px;\n  font-size:.8rem;font-weight:600;\n  transition:background 150ms ease, transform 150ms ease;\n}\n.nav-cta:hover{background:#fff;transform:translateY(-1px);}\n@media (max-width:780px){.  .mono-inline{color:var(--accent);font-size:.85em;}\n\n/* ============ COMPARISON ============ */\n.cmp-wrap{\n  border:1px solid var(--border-dim);\n  border-radius:14px;\n  overflow:hidden;\n}\n.cmp{\n  width:100%;\n  border-collapse:collapse;\n  font-size:.82rem;\n}\n.cmp th, .cmp td{\n  padding:.95rem 1.15rem;\n  text-align:left;\n  border-bottom:1px solid var(--border-dim);\n  vertical-align:middle;\n}\n.cmp thead th{\n  font-weight:500;\n  font-size:.68rem;\n  text-transform:uppercase;\n  letter-spacing:.08em;\n  color:var(--text-faint);\n  background:var(--bg-elev);\n}\n.cmp tbody tr:last-child td{border-bottom:none;}\n.cmp .cap{color:var(--text-main);font-weight:500;}\n.cmp .ours{\n  background:var(--accent-tint);\n  color:var(--accent);\n  border-left:2px solid var(--accent);\n  font-weight:500;\n}\n.cmp thead .ours{color:var(--accent);background:rgba(170,200,255,.08);}\n.cmp .yes{color:var(--accent);font-weight:600;}\n.cmp .no{color:var(--text-faint);}\n.cmp td{color:var(--text-dim);}\n@media (max-width:780px){\n  .cmp-wrap{overflow-x:auto;}\n  .cmp{min-width:680px;}\n}\n\n/* ============ API SPLIT ============ */\n.split{\n  display:grid;\n  grid-template-columns:minmax(0,1fr) minmax(0,1fr);\n  gap:1.5rem;\n  align-items:start;\n}\n@media (max-width:980px){.split{grid-template-columns:1fr;}}\n\n.code-window{\n  background:var(--bg-sunk);\n  border:1px solid var(--border-dim);\n  border-radius:14px;\n  overflow:hidden;\n  font-size:.78rem;\n  line-height:1.65;\n}\n.code-header{\n  display:flex;align-items:center;justify-content:space-between;\n  padding:.65rem 1rem;\n  background:var(--bg-elev);\n  border-bottom:1px solid var(--border-dim);\n}\n.traffic{display:flex;gap:.4rem;}\n.traffic span{width:10px;height:10px;border-radius:50%;display:block;}\n.traffic span:nth-child(1){background:#ff5f57;}\n.traffic span:nth-child(2){background:#febc2e;}\n.traffic span:nth-child(3){background:#28c93f;}\n.lang-tag{\n  font-size:.65rem;color:var(--text-faint);\n  letter-spacing:.1em;text-transform:uppercase;\n}\n.code-body{\n  padding:1.25rem;\n  overflow-x:auto;\n  color:var(--text-main);\n}\n.code-body pre{margin:0;font-family:inherit;}\n.tk-com{color:var(--text-faint);font-style:italic;}\n.tk-kw{color:var(--accent);}\n.tk-fn{color:var(--text-main);}\n.tk-str{color:var(--positive);}\n.tk-num{color:var(--warning);}\n.tk-arg{color:var(--text-dim);}\n.tk-op{color:var(--text-faint);}\n\n.api-list{display:flex;flex-direction:column;gap:.85rem;margin:0;padding:0;list-style:none;}\n.api-list li{\n  display:flex;gap:1rem;align-items:flex-start;\n  padding:1.1rem 1.25rem;\n  border:1px solid var(--border-dim);\n  border-radius:12px;\n  background:var(--bg-card);\n  transition:border-color 200ms ease;\n}\n.api-list li:hover{border-color:var(--border-glow);}\n.api-list .num{\n  flex-shrink:0;\n  font-size:.7rem;\n  color:var(--accent);\n  letter-spacing:.04em;\n  padding-top:1px;\n  font-weight:500;\n}\n.api-list b{color:var(--text-main);font-weight:600;display:block;margin-bottom:.25rem;font-size:.88rem;}\n.api-list .desc{font-size:.8rem;color:var(--text-dim);line-height:1.6;}\n.api-list .mono-inline{color:var(--accent);font-size:.92em;}\n\n/* ============ RESEARCH ============ */\n.research-grid{\n  display:grid;\n  grid-template-columns:repeat(3,minmax(0,1fr));\n  gap:1.25rem;\n}\n@media (max-width:980px){.research-grid{grid-template-columns:1fr;}}\n.paper-card{\n  display:flex;flex-direction:column;gap:.6rem;\n}\n.paper-tag{\n  align-self:flex-start;\n  font-size:.66rem;\n  letter-spacing:.06em;\n  padding:.3rem .55rem;\n  border:1px solid var(--border-dim);\n  border-radius:5px;\n  color:var(--accent);\n  background:var(--accent-tint);\n  text-transform:uppercase;\n}\n.paper-card h3{font-size:.95rem;font-weight:600;color:var(--text-main);line-height:1.35;}\n.paper-meta{font-size:.74rem;color:var(--text-faint);}\n.paper-card > p{margin:.25rem 0 0;font-size:.82rem;color:var(--text-dim);line-height:1.65;}\n.paper-card .mono-inline{color:var(--accent);font-size:.95em;}\n.paper-link{\n  margin-top:auto;padding-top:.75rem;\n  font-size:.78rem;\n  color:var(--accent);\n  align-self:flex-start;\n  border-bottom:1px solid transparent;\n  transition:border-color 180ms ease;\n}\n.paper-link:hover{border-bottom-color:var(--accent);}\n\n.disclaimer{\n  margin-top:1.25rem;\n  padding:1.25rem 1.5rem;\n  background:rgba(245,181,114,.05);\n  border:1px solid rgba(245,181,114,.25);\n  border-left:3px solid var(--warning);\n  border-radius:10px;\n  font-size:.82rem;\n  color:var(--text-main);\n  line-height:1.7;\n}\n.disclaimer b{color:var(--warning);font-weight:600;}\n.disclaimer a{color:var(--accent);text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(170,200,255,.3);}\n.disclaimer a:hover{text-decoration-color:var(--accent);}\n\n/* ============ BENCHMARKS ============ */\n.bench-grid{\n  display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:1.25rem;\n}\n@media (max-width:760px){.bench-grid{grid-template-columns:1fr;}}\n.bench-card h3{font-size:1rem;font-weight:600;margin-bottom:.25rem;color:var(--text-main);}\n.bench-card .src{color:var(--text-faint);font-size:.74rem;display:block;margin-bottom:1.25rem;}\n.metric{margin:.85rem 0;}\n.metric-top{\n  display:flex;justify-content:space-between;align-items:baseline;\n  font-size:.78rem;margin-bottom:.4rem;\n}\n.metric-top .label{color:var(--text-dim);}\n.metric-top .val{color:var(--text-main);font-weight:500;}\n.metric-top .delta{\n  color:var(--positive);\n  margin-left:.5rem;font-size:.72rem;\n  background:rgba(109,217,179,.08);\n  padding:.1rem .4rem;border-radius:4px;\n  border:1px solid rgba(109,217,179,.25);\n}\n.metric-top .delta.amber{\n  color:var(--warning);\n  background:rgba(245,181,114,.08);\n  border-color:rgba(245,181,114,.25);\n}\n.bar{\n  position:relative;\n  height:5px;background:var(--bg-sunk);border-radius:999px;overflow:hidden;\n  border:1px solid var(--border-dim);\n}\n.bar-fill{\n  position:absolute;left:0;top:0;bottom:0;\n  background:var(--positive);\n  border-radius:999px;\n  width:0;\n  transition:width 1200ms cubic-bezier(0.4,0,0.2,1);\n}\n.bar-fill.amber{background:var(--warning);}\n\n.caveat{\n  margin-top:1.5rem;\n  padding:1.5rem 1.75rem;\n  background:rgba(245,181,114,.05);\n  border:1px solid rgba(245,181,114,.25);\n  border-left:3px solid var(--warning);\n  border-radius:12px;\n  display:flex;gap:1rem;align-items:flex-start;\n}\n.caveat .glyph{\n  flex-shrink:0;color:var(--warning);font-weight:700;font-size:.95rem;letter-spacing:.05em;\n}\n.caveat h4{margin:0 0 .5rem;color:var(--warning);font-weight:700;font-size:.92rem;}\n.caveat p{margin:0;color:var(--text-main);font-size:.86rem;line-height:1.7;}\n.caveat a{color:var(--accent);text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(170,200,255,.3);}\n\n/* ============ INSTALL ============ */\n.install-grid{\n  display:grid;\n  grid-template-columns:repeat(3,minmax(0,1fr));gap:1.25rem;\n}\n@media (max-width:980px){.install-grid{grid-template-columns:1fr;}}\n.install-card{\n  display:flex;flex-direction:column;gap:.85rem;\n}\n.install-card.featured{\n  border-color:rgba(170,200,255,.3);\n  background:linear-gradient(180deg, rgba(170,200,255,.04) 0%, var(--bg-card) 100%);\n}\n.install-tag{\n  align-self:flex-start;\n  font-size:.66rem;\n  letter-spacing:.06em;\n  color:var(--accent);\n  text-transform:uppercase;\n}\n.install-card h3{font-size:.98rem;font-weight:600;color:var(--text-main);margin-bottom:.25rem;}\n.install-card pre{\n  margin:0;\n  background:var(--bg-sunk);\n  border:1px solid var(--border-dim);\n  border-radius:8px;\n  padding:.85rem 1rem;\n  font-family:inherit;\n  font-size:.72rem;\n  color:var(--text-main);\n  overflow-x:hidden;\n  line-height:1.65;\n  white-space:pre-wrap;\n  word-break:break-word;\n  overflow-wrap:anywhere;\n}\n.install-card pre + pre{margin-top:.5rem;}\n.install-callout{\n  margin-top:1.25rem;\n  padding:.95rem 1.25rem;\n  border:1px dashed var(--border-dim);\n  border-radius:10px;\n  font-size:.78rem;color:var(--text-dim);\n  display:flex;flex-wrap:wrap;gap:.5rem 1.5rem;align-items:center;justify-content:space-between;\n}\n.install-callout b{color:var(--text-main);font-weight:600;}\n.install-callout a{color:var(--accent);}\n\n/* ============ ROADMAP TEASER ============ */\n.roadmap{padding:2rem 1.5rem 5rem;}\n.roadmap-card{\n  max-width:var(--max);\n  margin:0 auto;\n  padding:2rem;\n  background:linear-gradient(180deg, var(--bg-card) 0%, var(--bg-elev) 100%);\n  border:1px solid var(--border-dim);\n  border-radius:18px;\n  display:grid;\n  grid-template-columns:minmax(0,1fr) auto;\n  gap:2rem;\n  align-items:center;\n}\n@media (max-width:780px){.roadmap-card{grid-template-columns:1fr;}}\n.roadmap-card h3{\n  font-size:1.4rem;font-weight:700;color:var(--text-main);\n  margin:.75rem 0 .5rem;letter-spacing:-.02em;\n}\n.roadmap-card p{margin:0;color:var(--text-dim);font-size:.88rem;line-height:1.7;}\n.roadmap-cta{\n  font-size:.82rem;\n  color:var(--accent);\n  padding:.7rem 1.1rem;\n  border:1px solid var(--border-glow);\n  border-radius:10px;\n  transition:all 180ms ease;\n  white-space:nowrap;\n}\n.roadmap-cta:hover{border-color:var(--accent);background:var(--accent-tint);}\n\n/* ============ FOOTER ============ */\n.footer{\n  border-top:1px solid var(--border-dim);\n  padding:3rem 1.5rem;\n  background:var(--bg-deep);\n}\n.footer-inner{\n  max-width:var(--max);margin:0 auto;\n  display:grid;\n  grid-template-columns:1.4fr 1fr 1fr;\n  gap:3rem;\n}\n@media (max-width:780px){\n  .footer-inner{grid-template-columns:1fr;gap:2rem;}\n}\n.footer .lic{color:var(--text-faint);margin:1rem 0 1.25rem;font-size:.78rem;}\n.bibtex{\n  background:var(--bg-card);\n  border:1px solid var(--border-dim);\n  border-radius:10px;\n  padding:1rem 1.25rem;\n  font-family:inherit;\n  font-size:.7rem;\n  color:var(--text-dim);\n  white-space:pre;\n  overflow-x:auto;\n  line-height:1.6;\n}\n.footer-col h5{\n  font-size:.68rem;\n  color:var(--text-faint);\n  text-transform:uppercase;\n  letter-spacing:.1em;\n  margin-bottom:.75rem;\n  font-weight:500;\n}\n.footer-col ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:.55rem;}\n.footer-col a{\n  font-size:.82rem;color:var(--text-dim);\n  transition:color 150ms ease;\n}\n.footer-col a:hover{color:var(--text-main);}\n\n/* ============ REVEAL ============ */\n.reveal{opacity:0;transform:translateY(16px);transition:opacity 600ms ease-out, transform 600ms ease-out;}\n.reveal.in{opacity:1;transform:translateY(0);}\n.reveal[data-stagger]{transition-delay:calc(var(--i,0) * 70ms);}\n\n@media (prefers-reduced-motion: reduce){\n  *,*::before,*::after{\n    animation-duration:.001ms !important;\n    transition-duration:.001ms !important;\n  }\n  .reveal{opacity:1;transform:none;}\n}\n\n@media (max-width:520px){\n  section{padding:4.5rem 1.25rem;}\n  .hero{padding:4rem 1.25rem;}\n  .card{padding:1.5rem;}\n  .gate-stage{height:440px;}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<a class=\"skip\" href=\"#main\">Skip to content<\u002Fa>\n\n<!-- ============ ANNOUNCEMENT BAR ============ -->\n<div class=\"announce\">\n  <div class=\"announce-inner\">\n    <span>v0.4.1 shipped — production-hardened with hybrid retrieval<\u002Fspan>\n    <span class=\"sep\">·<\u002Fspan>\n    <a href=\"#\" rel=\"external\">Read the changelog ↗<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ NAV ============ -->\n<nav class=\"nav\" id=\"nav\" aria-label=\"Primary\">\n  <div class=\"nav-inner\">\n    <a href=\"#\" class=\"logo\">\n      <span class=\"logo-mark\" aria-hidden=\"true\"><\u002Fspan>\n      <span>pgmnemo<\u002Fspan>\n    <\u002Fa>\n    <div class=\"nav-links\">\n      <a href=\"#docs\">Docs<\u002Fa>\n      <a href=\"#\" rel=\"external\">GitHub ↗<\u002Fa>\n      <a href=\"#install\" rel=\"external\">PGXN ↗<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"nav-right\">\n      <a class=\"nav-cta\" href=\"#install\">Install →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<main id=\"main\">\n\n<!-- ============ HERO ============ -->\n<section class=\"hero\">\n  <svg class=\"hero-traces\" viewBox=\"0 0 1440 800\" preserveAspectRatio=\"xMidYMax slice\" aria-hidden=\"true\">\n    <defs>\n      <linearGradient id=\"trace\" x1=\"0\" x2=\"0\" y1=\"1\" y2=\"0\">\n        <stop offset=\"0%\" stop-color=\"#aac8ff\" stop-opacity=\".25\"><\u002Fstop>\n        <stop offset=\"60%\" stop-color=\"#aac8ff\" stop-opacity=\".06\"><\u002Fstop>\n        <stop offset=\"100%\" stop-color=\"#aac8ff\" stop-opacity=\"0\"><\u002Fstop>\n      <\u002FlinearGradient>\n    <\u002Fdefs>\n    <g stroke=\"url(#trace)\" stroke-width=\"1\" fill=\"none\">\n      <path d=\"M0,800 L0,620 L180,620 L240,560 L240,420 L380,420 L420,380 L420,260\"><\u002Fpath>\n      <path d=\"M200,800 L200,700 L320,700 L380,640 L380,500 L520,500 L560,460 L560,340\"><\u002Fpath>\n      <path d=\"M480,800 L480,680 L600,680 L640,640 L640,520 L780,520 L820,480 L820,360\"><\u002Fpath>\n      <path d=\"M720,800 L720,720 L840,720 L900,660 L900,500 L1040,500 L1080,460 L1080,300\"><\u002Fpath>\n      <path d=\"M1000,800 L1000,640 L1140,640 L1200,580 L1200,440 L1340,440 L1380,400 L1380,260\"><\u002Fpath>\n      <path d=\"M1240,800 L1240,720 L1340,720 L1400,660 L1400,500\"><\u002Fpath>\n    <\u002Fg>\n    <g fill=\"#aac8ff\">\n      <circle cx=\"240\" cy=\"420\" r=\"2\" opacity=\".4\"><\u002Fcircle>\n      <circle cx=\"420\" cy=\"260\" r=\"2\" opacity=\".4\"><\u002Fcircle>\n      <circle cx=\"640\" cy=\"520\" r=\"2\" opacity=\".4\"><\u002Fcircle>\n      <circle cx=\"900\" cy=\"500\" r=\"2\" opacity=\".4\"><\u002Fcircle>\n      <circle cx=\"1200\" cy=\"440\" r=\"2\" opacity=\".4\"><\u002Fcircle>\n      <circle cx=\"1380\" cy=\"260\" r=\"2\" opacity=\".4\"><\u002Fcircle>\n    <\u002Fg>\n  <\u002Fsvg>\n\n  <div class=\"hero-inner\">\n    <div class=\"version-pill reveal\" data-stagger=\"\" style=\"--i:0\">\n      <span class=\"br\">(<\u002Fspan>\n      <span class=\"bul\">●<\u002Fspan>\n      <span>v0.4.1 — production-hardened<\u002Fspan>\n      <span class=\"br\">)<\u002Fspan>\n    <\u002Fdiv>\n\n    <h1 class=\"reveal\" data-stagger=\"\" style=\"--i:1\">Memory that requires proof<br>before remembering.<\u002Fh1>\n\n    <p class=\"hero-sub reveal\" data-stagger=\"\" style=\"--i:2\">A PostgreSQL extension that gives AI agents persistent, auditable memory. Every lesson must carry a verifiable artifact — a git commit, a file hash, a test ID — before it enters long-term storage.<\u002Fp>\n\n    <div class=\"cta-row reveal\" data-stagger=\"\" style=\"--i:3\">\n      <a class=\"btn btn-primary\" href=\"#install\">Install in 60 seconds →<\u002Fa>\n      <a class=\"btn btn-ghost\" href=\"#\" rel=\"external\">View on GitHub ↗<\u002Fa>\n    <\u002Fdiv>\n\n    <div class=\"crumb-row reveal\" data-stagger=\"\" style=\"--i:4\">\n      <span class=\"crumb\">Provenance gate<\u002Fspan>\n      <span class=\"crumb\">Hybrid recall<\u002Fspan>\n      <span class=\"crumb\">Multi-tenant<\u002Fspan>\n      <span class=\"crumb\">Postgres-native<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ TAB NAV ============ -->\n<div class=\"tabnav\" id=\"tabnav\" role=\"navigation\" aria-label=\"Section navigation\">\n  <div class=\"tabnav-inner\">\n    <a href=\"#what\" data-tab=\"what\">What is pgmnemo<\u002Fa>\n    <a href=\"#how\" data-tab=\"how\">How it works<\u002Fa>\n    <a href=\"#who\" data-tab=\"who\">Who it's for<\u002Fa>\n    <a href=\"#matters\" data-tab=\"matters\">Why this matters<\u002Fa>\n    <a href=\"#compare\" data-tab=\"compare\">Compare<\u002Fa>\n    <a href=\"#api\" data-tab=\"api\">API<\u002Fa>\n    <a href=\"#research\" data-tab=\"research\">Research<\u002Fa>\n    <a href=\"#bench\" data-tab=\"bench\">Benchmarks<\u002Fa>\n    <a href=\"#install\" data-tab=\"install\">Install<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ WHAT IS PGMNEMO ============ -->\n<section id=\"what\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <span class=\"tag\">What is pgmnemo<\u002Fspan>\n      <h2 style=\"margin-top:1rem;\">Memory for AI agents, without the noise.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"what-grid\">\n      <div class=\"what-prose reveal\">\n        <p><b>The problem.<\u002Fb> AI agents hallucinate. Today's memory systems store whatever the agent says — including hallucinated summaries, made-up commit IDs, and confident-but-wrong conclusions. Three weeks later, a different agent reads that bad lesson and builds on it. The mistake compounds across runs.<\u002Fp>\n        <p><b>The fix.<\u002Fb> pgmnemo blocks that pattern with a provenance gate. Before any lesson is promoted to long-term memory, it must be attached to a verifiable artifact: a git <span class=\"mono-inline\">commit_sha<\u002Fspan>, a file hash, or a passing test ID. If no artifact exists, the lesson stays in a staging queue — never trusted by future runs.<\u002Fp>\n        <p><b>Where it lives.<\u002Fb> Not a separate service. Not a SaaS API. <span class=\"mono-inline\">CREATE EXTENSION pgmnemo;<\u002Fspan> in your existing PostgreSQL and you're done. The gate runs as a database-level row policy — application code cannot bypass it. Your data never leaves your server.<\u002Fp>\n      <\u002Fdiv>\n      <aside class=\"pullquote reveal\">\n        The one differentiator nobody else has: write-time provenance. Mem0, Zep, Letta, Pinecone — none of them require proof that a lesson is real before storing it.\n      <\u002Faside>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ HOW IT WORKS ============ -->\n<section id=\"how\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <span class=\"tag\">How it works<\u002Fspan>\n      <h2 style=\"margin-top:1rem;\">Three SQL calls. That's the whole pipeline.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"how-grid\">\n      <article class=\"card how-card reveal\" data-stagger=\"\" style=\"--i:0\">\n        <div class=\"how-num\">// step 01<\u002Fdiv>\n        <h3>Agent finishes a task<\u002Fh3>\n        <p>It produces an artifact — a git commit, a saved file, a passing test. That artifact is the proof the work is real.<\u002Fp>\n        <div class=\"how-snip\"><span class=\"c\"># Python<\u002Fspan>\nsha = git.commit(<span class=\"s\">\"fix JWT\"<\u002Fspan>)\n<span class=\"c\"># sha = 'abc1234'<\u002Fspan><\u002Fdiv>\n      <\u002Farticle>\n      <article class=\"card how-card reveal\" data-stagger=\"\" style=\"--i:1\">\n        <div class=\"how-num\">// step 02<\u002Fdiv>\n        <h3>pgmnemo verifies and stores<\u002Fh3>\n        <p><span style=\"color:var(--accent);\">ingest()<\u002Fspan> requires <span style=\"color:var(--accent);\">commit_sha<\u002Fspan> or <span style=\"color:var(--accent);\">artifact_hash<\u002Fspan>. Without it the write is blocked at the database layer — not by your app.<\u002Fp>\n        <div class=\"how-snip\"><span class=\"k\">SELECT<\u002Fspan> pgmnemo.ingest(\n  p_lesson_text := <span class=\"s\">'JWT…'<\u002Fspan>,\n  p_commit_sha  := <span class=\"s\">'abc1234'<\u002Fspan>\n);<\u002Fdiv>\n      <\u002Farticle>\n      <article class=\"card how-card reveal\" data-stagger=\"\" style=\"--i:2\">\n        <div class=\"how-num\">// step 03<\u002Fdiv>\n        <h3>Future agents recall it<\u002Fh3>\n        <p><span style=\"color:var(--accent);\">recall_lessons()<\u002Fspan> returns relevant past lessons using hybrid scoring: HNSW vectors + BM25 + recency + importance.<\u002Fp>\n        <div class=\"how-snip\"><span class=\"k\">SELECT<\u002Fspan> * <span class=\"k\">FROM<\u002Fspan>\n  pgmnemo.recall_lessons(\n    query_text := <span class=\"s\">'JWT rotation'<\u002Fspan>\n  )\n<span class=\"k\">ORDER BY<\u002Fspan> score <span class=\"k\">DESC<\u002Fspan>;<\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ WHO IT'S FOR ============ -->\n<section id=\"who\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <span class=\"tag\">Who it's for<\u002Fspan>\n      <h2 style=\"margin-top:1rem;\">You probably already have the stack pgmnemo needs.<\u002Fh2>\n      <p>If three of these describe your project, pgmnemo replaces ~200 lines of ad-hoc memory code with two SQL function calls.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"who-grid\">\n      <div class=\"who-item reveal\" data-stagger=\"\" style=\"--i:0\"><span class=\"who-check\" aria-hidden=\"true\">✓<\u002Fspan><span>You run a multi-agent pipeline (research → write → review, plan → code → test) and each run starts from zero context.<\u002Fspan><\u002Fdiv>\n      <div class=\"who-item reveal\" data-stagger=\"\" style=\"--i:1\"><span class=\"who-check\" aria-hidden=\"true\">✓<\u002Fspan><span>Your stack already has PostgreSQL + pgvector on Supabase, Neon, or self-hosted. You don't want to add a separate memory service.<\u002Fspan><\u002Fdiv>\n      <div class=\"who-item reveal\" data-stagger=\"\" style=\"--i:2\"><span class=\"who-check\" aria-hidden=\"true\">✓<\u002Fspan><span>You've watched an agent hallucinate a summary and seen that wrong summary poison the next run.<\u002Fspan><\u002Fdiv>\n      <div class=\"who-item reveal\" data-stagger=\"\" style=\"--i:3\"><span class=\"who-check\" aria-hidden=\"true\">✓<\u002Fspan><span>Your data has residency or sovereignty constraints — it can't go through a cloud memory API on someone else's infra.<\u002Fspan><\u002Fdiv>\n      <div class=\"who-item reveal\" data-stagger=\"\" style=\"--i:4\"><span class=\"who-check\" aria-hidden=\"true\">✓<\u002Fspan><span>You want memory that costs nothing beyond your existing Postgres bill. Apache 2.0, no usage tiers, no per-request pricing.<\u002Fspan><\u002Fdiv>\n      <div class=\"who-item reveal\" data-stagger=\"\" style=\"--i:5\"><span class=\"who-check\" aria-hidden=\"true\">✓<\u002Fspan><span>You need multi-tenant isolation at the database layer, not bolted on in your app code.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ WHY THIS MATTERS (with mock product UI) ============ -->\n<section id=\"matters\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <span class=\"tag\">Why this matters<\u002Fspan>\n      <h2 style=\"margin-top:1rem;\">Built for the three things teams actually need.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"matters-grid\">\n\n      <!-- CARD A: AUDIT-GRADE -->\n      <article class=\"card matters-card reveal\" data-stagger=\"\" style=\"--i:0\">\n        <div class=\"matters-icon\" aria-hidden=\"true\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M12 2 4 7v6c0 5 3.5 8.5 8 9 4.5-.5 8-4 8-9V7l-8-5Z\"><\u002Fpath><path d=\"m9 12 2 2 4-4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"matters-meta\">// audit-grade memory<\u002Fdiv>\n        <h3>Pass any compliance audit<\u002Fh3>\n        <p>Every memory write logged with role + project + commit + timestamp at the database layer. Time-travel via Postgres MVCC. Tamper-evident audit trail your auditor can query directly.<\u002Fp>\n        <div class=\"mock\" role=\"img\" aria-label=\"Mock audit log table\">\n          <div class=\"mock-bar\">\n            <span>pgmnemo.audit_log()<\u002Fspan>\n            <span class=\"dots\" aria-hidden=\"true\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n          <table class=\"audit-tab\">\n            <thead><tr><th>run<\u002Fth><th>role<\u002Fth><th>commit<\u002Fth><th>at<\u002Fth><th>trust<\u002Fth><\u002Ftr><\u002Fthead>\n            <tbody>\n              <tr><td>8423<\u002Ftd><td>dev<\u002Ftd><td class=\"commit\">abc1234…<\u002Ftd><td>14:22:01<\u002Ftd><td class=\"ok\">✓<\u002Ftd><\u002Ftr>\n              <tr><td>8424<\u002Ftd><td>dev<\u002Ftd><td class=\"commit\">def5678…<\u002Ftd><td>14:22:05<\u002Ftd><td class=\"ok\">✓<\u002Ftd><\u002Ftr>\n              <tr class=\"row-blocked\"><td>8425<\u002Ftd><td>qa<\u002Ftd><td class=\"commit\">NULL<\u002Ftd><td>14:22:08<\u002Ftd><td class=\"blk\">⚠ blocked<\u002Ftd><\u002Ftr>\n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- CARD B: TOKEN ECONOMY -->\n      <article class=\"card matters-card reveal\" data-stagger=\"\" style=\"--i:1\">\n        <div class=\"matters-icon\" aria-hidden=\"true\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><line x1=\"12\" y1=\"1\" x2=\"12\" y2=\"23\"><\u002Fline><path d=\"M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"matters-meta\">// token economy<\u002Fdiv>\n        <h3>Memory pays for itself<\u002Fh3>\n        <p>1M context windows cost $5+ per call. pgmnemo retrieves the right 10K tokens instead of stuffing 1M. Memory ROI is positive after the first day at typical agent workloads.<\u002Fp>\n        <div class=\"mock\" role=\"img\" aria-label=\"Mock weekly token savings chart\">\n          <div class=\"chart-head\">\n            <span class=\"big\">$14.32<\u002Fspan>\n            <span>weekly token saved<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"chart-meta\">\n            <span>1,847 retrievals<\u002Fspan><span class=\"sep\">·<\u002Fspan><span>32% hit rate<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"bars\" aria-hidden=\"true\">\n            <div class=\"bar\" style=\"height:44%\"><\u002Fdiv>\n            <div class=\"bar\" style=\"height:78%\"><\u002Fdiv>\n            <div class=\"bar\" style=\"height:33%\"><\u002Fdiv>\n            <div class=\"bar\" style=\"height:89%\"><\u002Fdiv>\n            <div class=\"bar\" style=\"height:55%\"><\u002Fdiv>\n            <div class=\"bar\" style=\"height:100%\"><\u002Fdiv>\n            <div class=\"bar\" style=\"height:67%\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"bar-labels\" aria-hidden=\"true\">\n            <span>M<\u002Fspan><span>T<\u002Fspan><span>W<\u002Fspan><span>T<\u002Fspan><span>F<\u002Fspan><span>S<\u002Fspan><span>S<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- CARD C: POSTGRES FLYWHEEL -->\n      <article class=\"card matters-card reveal\" data-stagger=\"\" style=\"--i:2\">\n        <div class=\"matters-icon\" aria-hidden=\"true\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><ellipse cx=\"12\" cy=\"5\" rx=\"9\" ry=\"3\"><\u002Fellipse><path d=\"M3 5v6c0 1.66 4.03 3 9 3s9-1.34 9-3V5\"><\u002Fpath><path d=\"M3 11v6c0 1.66 4.03 3 9 3s9-1.34 9-3v-6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"matters-meta\">// postgres flywheel<\u002Fdiv>\n        <h3>Every Postgres feature, free<\u002Fh3>\n        <p>JSONB → flexible metadata. pg_cron → automatic consolidation. Logical replication → multi-region HA. SaaS memory APIs have to build all this; pgmnemo inherits it.<\u002Fp>\n        <div class=\"mock\" role=\"img\" aria-label=\"Mock psql session with pg_cron schedule and EXPLAIN\">\n          <div class=\"mock-bar\">\n            <span>psql · pgmnemo<\u002Fspan>\n            <span class=\"dots\" aria-hidden=\"true\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n<div class=\"psql\"><span class=\"p\">postgres=#<\u002Fspan> <span class=\"dim\">SELECT<\u002Fspan> cron.schedule(<span class=\"s\">'pgm-evict'<\u002Fspan>,\n                          <span class=\"s\">'0 3 * * *'<\u002Fspan>,\n                          <span class=\"s\">'SELECT pgmnemo.evict()'<\u002Fspan>);\n<span class=\"hdr\"> schedule\n----------\n        7<\u002Fspan>\n<span class=\"p\">postgres=#<\u002Fspan> <span class=\"dim\">EXPLAIN ANALYZE SELECT<\u002Fspan> *\n<span class=\"dim\">  FROM<\u002Fspan> pgmnemo.recall_lessons(<span class=\"s\">'JWT'<\u002Fspan>);\n<span class=\"hdr\">                  QUERY PLAN\n─────────────────────────────────────────<\u002Fspan>\n Index Scan using ix_pgm_embed\n   <span class=\"dim\">Planning Time:<\u002Fspan> 0.087 ms\n   <span class=\"dim\">Execution Time:<\u002Fspan> <span class=\"s\">2.831 ms<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ DIFFERENTIATORS ============ -->\n<section id=\"why\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <span class=\"tag\">Why pgmnemo<\u002Fspan>\n      <h2 style=\"margin-top:1rem;\">Four things nobody else does.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"diff-grid\">\n      <article class=\"card diff-card reveal\" data-stagger=\"\" style=\"--i:0\">\n        <div class=\"diff-icon\" aria-hidden=\"true\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M12 2 4 7v6c0 5 3.5 8.5 8 9 4.5-.5 8-4 8-9V7l-8-5Z\"><\u002Fpath><path d=\"m9 12 2 2 4-4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Provenance gate<\u002Fh3>\n        <p>Write-time artifact requirement enforced at the database layer. The only memory product with this — and the reason hallucinations stay out of canonical memory.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"card diff-card reveal\" data-stagger=\"\" style=\"--i:1\">\n        <div class=\"diff-icon\" aria-hidden=\"true\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><ellipse cx=\"12\" cy=\"5\" rx=\"9\" ry=\"3\"><\u002Fellipse><path d=\"M3 5v6c0 1.66 4.03 3 9 3s9-1.34 9-3V5\"><\u002Fpath><path d=\"M3 11v6c0 1.66 4.03 3 9 3s9-1.34 9-3v-6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Zero new services<\u002Fh3>\n        <p>No daemons, no sidecars, no cloud accounts. <span class=\"mono-inline\">CREATE EXTENSION pgmnemo CASCADE;<\u002Fspan> — that's it. Memory lives where your data already does.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"card diff-card reveal\" data-stagger=\"\" style=\"--i:2\">\n        <div class=\"diff-icon\" aria-hidden=\"true\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"m13 2-3 7h6l-7 13 2-8H5l8-12Z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Hybrid recall in one SQL call<\u002Fh3>\n        <p>HNSW + BM25 + recency + importance, weighted via GUC-tunable formula. No glue code. No re-ranker microservice. One <span class=\"mono-inline\">SELECT<\u002Fspan>.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"card diff-card reveal\" data-stagger=\"\" style=\"--i:3\">\n        <div class=\"diff-icon\" aria-hidden=\"true\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>First-class role isolation<\u002Fh3>\n        <p>Multi-tenant from day one. <span class=\"mono-inline\">role<\u002Fspan> + <span class=\"mono-inline\">project_id<\u002Fspan> row-level security enforced inside Postgres — not by your app.<\u002Fp>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PROVENANCE DIAGRAM ============ -->\n<section id=\"gate\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <span class=\"tag\">The differentiator<\u002Fspan>\n      <h2 style=\"margin-top:1rem;\">The only memory layer with a write-time provenance gate.<\u002Fh2>\n      <p>Hallucinated lessons cannot enter long-term memory. Every <span style=\"color:var(--accent);\">ingest()<\u002Fspan> requires a verifiable artifact — git commit SHA, file hash, or test ID. Enforced at the database layer.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"gate-stage reveal\">\n      <div class=\"lane-label t ok\"><span class=\"d\">●<\u002Fspan>VERIFIED LANE<\u002Fdiv>\n      <div class=\"lane-label b no\"><span class=\"d\">●<\u002Fspan>UNVERIFIED LANE<\u002Fdiv>\n      <svg viewBox=\"0 0 1000 520\" preserveAspectRatio=\"xMidYMid meet\" aria-hidden=\"true\">\n        <defs>\n          <linearGradient id=\"ok-trail\" x1=\"0\" x2=\"1\">\n            <stop offset=\"0%\" stop-color=\"#aac8ff\" stop-opacity=\"0\"><\u002Fstop>\n            <stop offset=\"50%\" stop-color=\"#aac8ff\" stop-opacity=\".8\"><\u002Fstop>\n            <stop offset=\"100%\" stop-color=\"#aac8ff\" stop-opacity=\".8\"><\u002Fstop>\n          <\u002FlinearGradient>\n          <linearGradient id=\"bad-trail\" x1=\"0\" x2=\"1\">\n            <stop offset=\"0%\" stop-color=\"#f5b572\" stop-opacity=\"0\"><\u002Fstop>\n            <stop offset=\"60%\" stop-color=\"#f5b572\" stop-opacity=\".5\"><\u002Fstop>\n            <stop offset=\"100%\" stop-color=\"#f5b572\" stop-opacity=\"0\"><\u002Fstop>\n          <\u002FlinearGradient>\n        <\u002Fdefs>\n\n        <!-- TOP LANE -->\n        <g>\n          <line x1=\"60\" y1=\"160\" x2=\"940\" y2=\"160\" stroke=\"#1a2238\" stroke-width=\"1\" stroke-dasharray=\"3 6\"><\u002Fline>\n          <g transform=\"translate(60,140)\">\n            <rect x=\"0\" y=\"0\" width=\"260\" height=\"40\" rx=\"8\" fill=\"#0d1124\" stroke=\"#1a2238\"><\u002Frect>\n            <text x=\"14\" y=\"25\" font-family=\"'JetBrains Mono',monospace\" font-size=\"12\" fill=\"#e8edf6\">\n              agent.ingest(<tspan fill=\"#aac8ff\">commit_sha<\u002Ftspan>=<tspan fill=\"#6dd9b3\">'abc123'<\u002Ftspan>)\n            <\u002Ftext>\n          <\u002Fg>\n          <g transform=\"translate(470,120)\">\n            <rect x=\"0\" y=\"0\" width=\"80\" height=\"80\" rx=\"12\" fill=\"rgba(170,200,255,.06)\" stroke=\"#aac8ff\" stroke-width=\"1.2\"><\u002Frect>\n            <path d=\"M22,22 L22,58 M58,22 L58,58\" stroke=\"#aac8ff\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M22,32 L36,32 M22,40 L34,40 M22,48 L36,48\" stroke=\"#aac8ff\" stroke-width=\"1.2\" stroke-linecap=\"round\" opacity=\".5\"><\u002Fpath>\n            <path d=\"M58,32 L44,32 M58,40 L46,40 M58,48 L44,48\" stroke=\"#aac8ff\" stroke-width=\"1.2\" stroke-linecap=\"round\" opacity=\".5\"><\u002Fpath>\n            <text x=\"40\" y=\"100\" text-anchor=\"middle\" font-family=\"'JetBrains Mono',monospace\" font-size=\"9\" fill=\"#aac8ff\" letter-spacing=\"2\">OPEN<\u002Ftext>\n          <\u002Fg>\n          <g transform=\"translate(700,140)\">\n            <rect x=\"0\" y=\"0\" width=\"240\" height=\"40\" rx=\"8\" fill=\"rgba(170,200,255,.04)\" stroke=\"#aac8ff\" stroke-opacity=\".5\"><\u002Frect>\n            <text x=\"14\" y=\"25\" font-family=\"'JetBrains Mono',monospace\" font-size=\"12\" fill=\"#aac8ff\">\n              ✓ canonical memory\n            <\u002Ftext>\n          <\u002Fg>\n          <path id=\"path-ok\" d=\"M320,160 L700,160\" fill=\"none\" stroke=\"url(#ok-trail)\" stroke-width=\"1.5\" opacity=\".4\"><\u002Fpath>\n          <circle r=\"5\" fill=\"#aac8ff\">\n            <animateMotion dur=\"6s\" repeatCount=\"indefinite\"><mpath href=\"#path-ok\"><\u002Fmpath><\u002FanimateMotion>\n            <animate attributeName=\"opacity\" values=\"0;1;1;0\" keyTimes=\"0;.1;.9;1\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n          <\u002Fcircle>\n          <circle r=\"3\" fill=\"#aac8ff\" opacity=\".6\">\n            <animateMotion dur=\"6s\" begin=\"-.4s\" repeatCount=\"indefinite\"><mpath href=\"#path-ok\"><\u002Fmpath><\u002FanimateMotion>\n            <animate attributeName=\"opacity\" values=\"0;.6;.6;0\" keyTimes=\"0;.1;.9;1\" dur=\"6s\" begin=\"-.4s\" repeatCount=\"indefinite\"><\u002Fanimate>\n          <\u002Fcircle>\n        <\u002Fg>\n\n        <!-- BOTTOM LANE -->\n        <g>\n          <line x1=\"60\" y1=\"360\" x2=\"940\" y2=\"360\" stroke=\"#1a2238\" stroke-width=\"1\" stroke-dasharray=\"3 6\"><\u002Fline>\n          <g transform=\"translate(60,340)\">\n            <rect x=\"0\" y=\"0\" width=\"260\" height=\"40\" rx=\"8\" fill=\"#0d1124\" stroke=\"#1a2238\"><\u002Frect>\n            <text x=\"14\" y=\"25\" font-family=\"'JetBrains Mono',monospace\" font-size=\"12\" fill=\"#e8edf6\">\n              agent.ingest(<tspan fill=\"#f5b572\">no_artifact<\u002Ftspan>)\n            <\u002Ftext>\n          <\u002Fg>\n          <g transform=\"translate(470,320)\">\n            <rect x=\"0\" y=\"0\" width=\"80\" height=\"80\" rx=\"12\" fill=\"rgba(245,181,114,.06)\" stroke=\"#f5b572\" stroke-width=\"1.2\"><\u002Frect>\n            <path d=\"M14,28 L66,28 M14,40 L66,40 M14,52 L66,52\" stroke=\"#f5b572\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M22,20 L22,60 M40,20 L40,60 M58,20 L58,60\" stroke=\"#f5b572\" stroke-width=\"1.2\" stroke-linecap=\"round\" opacity=\".5\"><\u002Fpath>\n            <text x=\"40\" y=\"100\" text-anchor=\"middle\" font-family=\"'JetBrains Mono',monospace\" font-size=\"9\" fill=\"#f5b572\" letter-spacing=\"2\">BLOCKED<\u002Ftext>\n          <\u002Fg>\n          <g transform=\"translate(700,340)\">\n            <rect x=\"0\" y=\"0\" width=\"240\" height=\"40\" rx=\"8\" fill=\"rgba(245,181,114,.03)\" stroke=\"#f5b572\" stroke-opacity=\".4\" stroke-dasharray=\"4 4\"><\u002Frect>\n            <text x=\"14\" y=\"25\" font-family=\"'JetBrains Mono',monospace\" font-size=\"12\" fill=\"#f5b572\">\n              ⚠ staging queue\n            <\u002Ftext>\n          <\u002Fg>\n          <path id=\"path-bad\" d=\"M320,360 L470,360\" fill=\"none\" stroke=\"url(#bad-trail)\" stroke-width=\"1.5\" opacity=\".4\"><\u002Fpath>\n          <circle r=\"4\" fill=\"#f5b572\">\n            <animateMotion dur=\"6s\" repeatCount=\"indefinite\"><mpath href=\"#path-bad\"><\u002Fmpath><\u002FanimateMotion>\n            <animate attributeName=\"opacity\" values=\"0;1;1;0;0\" keyTimes=\"0;.15;.45;.55;1\" dur=\"6s\" repeatCount=\"indefinite\"><\u002Fanimate>\n          <\u002Fcircle>\n        <\u002Fg>\n      <\u002Fsvg>\n    <\u002Fdiv>\n\n    <div class=\"micro-features\">\n      <div class=\"micro reveal\" data-stagger=\"\" style=\"--i:0\">\n        <b>Write-time enforcement<\u002Fb>\n        RLS-level checks, cannot be bypassed in app code.\n      <\u002Fdiv>\n      <div class=\"micro reveal\" data-stagger=\"\" style=\"--i:1\">\n        <b>Cryptographic verification<\u002Fb>\n        <span class=\"mono-inline\">commit_sha<\u002Fspan>, <span class=\"mono-inline\">artifact_hash<\u002Fspan>, <span class=\"mono-inline\">test_id<\u002Fspan>.\n      <\u002Fdiv>\n      <div class=\"micro reveal\" data-stagger=\"\" style=\"--i:2\">\n        <b>Audit trail<\u002Fb>\n        Every gate decision queryable forever.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ COMPARISON ============ -->\n<section id=\"compare\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <span class=\"tag\">Comparison<\u002Fspan>\n      <h2 style=\"margin-top:1rem;\">Honest comparison. We benchmark against ourselves.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"cmp-wrap reveal\">\n      <table class=\"cmp\">\n        <thead>\n          <tr>\n            <th>Capability<\u002Fth>\n            <th class=\"ours\">pgmnemo<\u002Fth>\n            <th>mem0<\u002Fth>\n            <th>Zep<\u002Fth>\n            <th>Letta<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr>\n            <td class=\"cap\">Provenance enforcement<\u002Ftd>\n            <td class=\"ours\"><span class=\"yes\">✓<\u002Fspan> mandatory<\u002Ftd>\n            <td><span class=\"no\">✗<\u002Fspan><\u002Ftd>\n            <td><span class=\"no\">✗<\u002Fspan><\u002Ftd>\n            <td><span class=\"no\">✗<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"cap\">Zero data egress<\u002Ftd>\n            <td class=\"ours\"><span class=\"yes\">✓<\u002Fspan> in-database<\u002Ftd>\n            <td><span class=\"no\">✗<\u002Fspan> Cloud API<\u002Ftd>\n            <td><span class=\"no\">✗<\u002Fspan> Cloud API<\u002Ftd>\n            <td><span class=\"no\">✗<\u002Fspan> Cloud API<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"cap\">Install model<\u002Ftd>\n            <td class=\"ours\">CREATE EXTENSION<\u002Ftd>\n            <td>SaaS API key<\u002Ftd>\n            <td>SaaS API key<\u002Ftd>\n            <td>Separate service<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"cap\">Hybrid recall<\u002Ftd>\n            <td class=\"ours\"><span class=\"yes\">✓<\u002Fspan> default v0.4.0<\u002Ftd>\n            <td>Varies<\u002Ftd>\n            <td>Varies<\u002Ftd>\n            <td>Varies<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"cap\">Self-hosted cost<\u002Ftd>\n            <td class=\"ours\">Free · Apache-2.0<\u002Ftd>\n            <td>$0.004/1K reads<\u002Ftd>\n            <td>$0.0001/msg<\u002Ftd>\n            <td>Vendor<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td class=\"cap\">LongMemEval recall@10<\u002Ftd>\n            <td class=\"ours\">0.9334<\u002Ftd>\n            <td>Not published<\u002Ftd>\n            <td>Not published<\u002Ftd>\n            <td>Not published<\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ API ============ -->\n<section id=\"api\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <span class=\"tag\">API<\u002Fspan>\n      <h2 style=\"margin-top:1rem;\">Two function calls. The rest is SQL you already know.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"split\">\n      <div class=\"code-window reveal\">\n        <div class=\"code-header\">\n          <div class=\"traffic\" aria-hidden=\"true\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fdiv>\n          <span class=\"lang-tag\">SQL<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"code-body\">\n<pre><span class=\"tk-com\">-- Store with provenance (required)<\u002Fspan>\n<span class=\"tk-kw\">SELECT<\u002Fspan> <span class=\"tk-fn\">pgmnemo.ingest<\u002Fspan>(\n    <span class=\"tk-arg\">p_role<\u002Fspan>        <span class=\"tk-op\">:=<\u002Fspan> <span class=\"tk-str\">'developer'<\u002Fspan>,\n    <span class=\"tk-arg\">p_project_id<\u002Fspan>  <span class=\"tk-op\">:=<\u002Fspan> <span class=\"tk-num\">1<\u002Fspan>,\n    <span class=\"tk-arg\">p_topic<\u002Fspan>       <span class=\"tk-op\">:=<\u002Fspan> <span class=\"tk-str\">'auth'<\u002Fspan>,\n    <span class=\"tk-arg\">p_lesson_text<\u002Fspan> <span class=\"tk-op\">:=<\u002Fspan> <span class=\"tk-str\">'Rotate JWT after key compromise.'<\u002Fspan>,\n    <span class=\"tk-arg\">p_commit_sha<\u002Fspan>  <span class=\"tk-op\">:=<\u002Fspan> <span class=\"tk-str\">'abc1234'<\u002Fspan>\n);\n\n<span class=\"tk-com\">-- Hybrid recall<\u002Fspan>\n<span class=\"tk-kw\">SELECT<\u002Fspan> lesson_text, score, vec_score, bm25_score\n<span class=\"tk-kw\">FROM<\u002Fspan> <span class=\"tk-fn\">pgmnemo.recall_lessons<\u002Fspan>(\n    <span class=\"tk-arg\">query_embedding<\u002Fspan> <span class=\"tk-op\">:=<\u002Fspan> <span class=\"tk-fn\">embed<\u002Fspan>(<span class=\"tk-str\">'JWT rotation'<\u002Fspan>),\n    <span class=\"tk-arg\">query_text<\u002Fspan>      <span class=\"tk-op\">:=<\u002Fspan> <span class=\"tk-str\">'JWT secret rotation'<\u002Fspan>,\n    <span class=\"tk-arg\">role_filter<\u002Fspan>     <span class=\"tk-op\">:=<\u002Fspan> <span class=\"tk-str\">'developer'<\u002Fspan>\n) <span class=\"tk-kw\">ORDER BY<\u002Fspan> score <span class=\"tk-kw\">DESC<\u002Fspan> <span class=\"tk-kw\">LIMIT<\u002Fspan> <span class=\"tk-num\">10<\u002Fspan>;<\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <ol class=\"api-list\">\n        <li class=\"reveal\" data-stagger=\"\" style=\"--i:0\"><div class=\"num\">[ 1 / 5 ]<\u002Fdiv><div><b>Provenance-gated writes<\u002Fb><div class=\"desc\"><span class=\"mono-inline\">commit_sha<\u002Fspan> or <span class=\"mono-inline\">artifact_hash<\u002Fspan> required at insert time. No artifact → no canonical row.<\u002Fdiv><\u002Fdiv><\u002Fli>\n        <li class=\"reveal\" data-stagger=\"\" style=\"--i:1\"><div class=\"num\">[ 2 / 5 ]<\u002Fdiv><div><b>Hybrid scoring formula<\u002Fb><div class=\"desc\"><span class=\"mono-inline\">0.4×cosine + 0.4×BM25 + 0.2×recency<\u002Fspan> — all weights GUC-tunable per session.<\u002Fdiv><\u002Fdiv><\u002Fli>\n        <li class=\"reveal\" data-stagger=\"\" style=\"--i:2\"><div class=\"num\">[ 3 / 5 ]<\u002Fdiv><div><b>Graph traversal<\u002Fb><div class=\"desc\"><span class=\"mono-inline\">traverse_causal_chain()<\u002Fspan> and <span class=\"mono-inline\">traverse_temporal_window()<\u002Fspan> for typed edges between lessons.<\u002Fdiv><\u002Fdiv><\u002Fli>\n        <li class=\"reveal\" data-stagger=\"\" style=\"--i:3\"><div class=\"num\">[ 4 / 5 ]<\u002Fdiv><div><b>Diagnostic columns<\u002Fb><div class=\"desc\"><span class=\"mono-inline\">vec_score<\u002Fspan>, <span class=\"mono-inline\">bm25_score<\u002Fspan>, <span class=\"mono-inline\">rrf_score<\u002Fspan> — see which retrieval path actually fired.<\u002Fdiv><\u002Fdiv><\u002Fli>\n        <li class=\"reveal\" data-stagger=\"\" style=\"--i:4\"><div class=\"num\">[ 5 / 5 ]<\u002Fdiv><div><b>LangChain integration<\u002Fb><div class=\"desc\">Drop-in retriever in <span class=\"mono-inline\">integrations/langchain/<\u002Fspan>. Works with any LangChain agent.<\u002Fdiv><\u002Fdiv><\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ RESEARCH ============ -->\n<section id=\"research\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <span class=\"tag\">Research<\u002Fspan>\n      <h2 style=\"margin-top:1rem;\">Built on peer-reviewed research.<\u002Fh2>\n      <p>pgmnemo's architecture is informed by recent academic work on agent memory. We cite the originals and benchmark against them.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"research-grid\">\n      <article class=\"card paper-card reveal\" data-stagger=\"\" style=\"--i:0\">\n        <span class=\"paper-tag\">arxiv:2601.03236<\u002Fspan>\n        <h3>MAGMA: Multi-graph Agent Memory Architecture<\u002Fh3>\n        <span class=\"paper-meta\">Inspiration for edge taxonomy (semantic / temporal / causal / entity)<\u002Fspan>\n        <p>MAGMA defines four memory subgraphs and a learned traversal policy. pgmnemo implements the edge taxonomy as native Postgres types (<span class=\"mono-inline\">edge_kind<\u002Fspan> ENUM, per-kind partial indexes). The learned-policy traversal and dual-stream consolidation remain on the v0.5+ roadmap.<\u002Fp>\n        <a class=\"paper-link\" href=\"https://arxiv.org/abs/2601.03236\" target=\"_blank\" rel=\"noopener\">Read paper ↗<\u002Fa>\n      <\u002Farticle>\n      <article class=\"card paper-card reveal\" data-stagger=\"\" style=\"--i:1\">\n        <span class=\"paper-tag\">acl 2024<\u002Fspan>\n        <h3>LoCoMo: Evaluating Very Long-Term Conversational Memory of LLM-based Agents<\u002Fh3>\n        <span class=\"paper-meta\">Maharana et al. — our session-level benchmark<\u002Fspan>\n        <p>LoCoMo measures recall on multi-session conversations. pgmnemo v0.4.0 reaches <span class=\"mono-inline\">recall@10 = 0.8409<\u002Fspan> (+4.15pp vs v0.3.0, <span class=\"mono-inline\">p_corr=0.0156<\u002Fspan>). Reproducible with the DRAGON embedder per paper protocol.<\u002Fp>\n        <a class=\"paper-link\" href=\"https://arxiv.org/abs/2402.17753\" target=\"_blank\" rel=\"noopener\">Read paper ↗<\u002Fa>\n      <\u002Farticle>\n      <article class=\"card paper-card reveal\" data-stagger=\"\" style=\"--i:2\">\n        <span class=\"paper-tag\">iclr 2025<\u002Fspan>\n        <h3>LongMemEval: Benchmarking Long-Term Interactive Memory in Chat Assistants<\u002Fh3>\n        <span class=\"paper-meta\">Wu et al. — our retrieval-only benchmark<\u002Fspan>\n        <p>LongMemEval probes long-horizon retrieval on simulated user sessions. pgmnemo reaches <span class=\"mono-inline\">recall@10 = 0.9334<\u002Fspan>, <span class=\"mono-inline\">MRR = 0.8472<\u002Fspan>. We publish our gap honestly: a 50-line BM25 baseline reaches 0.9820 on this dataset. v0.5+ closes that gap via Stella-V5 embedder.<\u002Fp>\n        <a class=\"paper-link\" href=\"https://arxiv.org/abs/2410.10813\" target=\"_blank\" rel=\"noopener\">Read paper ↗<\u002Fa>\n      <\u002Farticle>\n    <\u002Fdiv>\n    <div class=\"disclaimer reveal\">\n      <b>pgmnemo is inspired by these papers. We do NOT claim parity with their full architectures.<\u002Fb> The provenance gate is original work; MAGMA-class learned-policy traversal and dual-stream consolidation are roadmap, not shipping. See <a href=\"#\">ROADMAP.md<\u002Fa> and <a href=\"#\">COMPETITIVE_REALITY.md<\u002Fa>.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ BENCHMARKS ============ -->\n<section id=\"bench\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <span class=\"tag\">Benchmarks<\u002Fspan>\n      <h2 style=\"margin-top:1rem;\">Real numbers. Published methodology. Honest caveats.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"bench-grid\">\n      <article class=\"card bench-card reveal\">\n        <h3>LoCoMo<\u002Fh3>\n        <span class=\"src\">Maharana et al., ACL 2024<\u002Fspan>\n        <div class=\"metric\">\n          <div class=\"metric-top\"><span class=\"label\">recall@10<\u002Fspan><span><span class=\"val\">0.8409<\u002Fspan><span class=\"delta\">+4.15pp<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div class=\"bar\"><div class=\"bar-fill\" data-w=\"84.09\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"metric\">\n          <div class=\"metric-top\"><span class=\"label\">recall@5<\u002Fspan><span><span class=\"val\">0.7230<\u002Fspan><span class=\"delta\">+6.07pp<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div class=\"bar\"><div class=\"bar-fill\" data-w=\"72.30\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"metric\">\n          <div class=\"metric-top\"><span class=\"label\">MRR<\u002Fspan><span><span class=\"val\">0.6365<\u002Fspan><span class=\"delta\">+7.96pp<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div class=\"bar\"><div class=\"bar-fill\" data-w=\"63.65\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"card bench-card reveal\">\n        <h3>LongMemEval-S<\u002Fh3>\n        <span class=\"src\">Wu et al., ICLR 2025<\u002Fspan>\n        <div class=\"metric\">\n          <div class=\"metric-top\"><span class=\"label\">recall@10 (pgmnemo)<\u002Fspan><span><span class=\"val\">0.9334<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div class=\"bar\"><div class=\"bar-fill\" data-w=\"93.34\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"metric\">\n          <div class=\"metric-top\"><span class=\"label\">MRR (pgmnemo)<\u002Fspan><span><span class=\"val\">0.8472<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div class=\"bar\"><div class=\"bar-fill\" data-w=\"84.72\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"metric\">\n          <div class=\"metric-top\"><span class=\"label\">recall@10 (BM25 baseline)<\u002Fspan><span><span class=\"val\">0.9820<\u002Fspan><span class=\"delta amber\">baseline wins<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div class=\"bar\"><div class=\"bar-fill amber\" data-w=\"98.20\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n\n    <aside class=\"caveat reveal\">\n      <div class=\"glyph\">!<\u002Fdiv>\n      <div>\n        <h4>Honest caveat<\u002Fh4>\n        <p>We lose to a 50-line BM25 script on LongMemEval (0.9334 vs 0.9820). Our LoCoMo session-level number uses a 22× smaller search space than the paper baseline. Comparisons with Mem0/Zep on these datasets are apples-to-oranges. See <a href=\"#\">COMPETITIVE_REALITY.md<\u002Fa>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ INSTALL ============ -->\n<section id=\"install\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <span class=\"tag\">Install<\u002Fspan>\n      <h2 style=\"margin-top:1rem;\">Pick your path. All three take under five minutes.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"install-grid\">\n      <article class=\"card install-card featured reveal\" data-stagger=\"\" style=\"--i:0\">\n        <span class=\"install-tag\">// pgxn · recommended<\u002Fspan>\n        <h3>One-line install<\u002Fh3>\n<pre>pgxn install pgmnemo==0.4.1<\u002Fpre>\n<pre>CREATE EXTENSION pgmnemo\n  CASCADE;<\u002Fpre>\n      <\u002Farticle>\n      <article class=\"card install-card reveal\" data-stagger=\"\" style=\"--i:1\">\n        <span class=\"install-tag\">// docker · production<\u002Fspan>\n        <h3>Bake into your image<\u002Fh3>\n<pre>FROM pgvector/pgvector:pg17\nADD pgmnemo-0.4.1.zip /tmp/\nRUN unzip /tmp/pgmnemo-0.4.1.zip \\\n &amp;&amp; cp -r pgmnemo/extension/* \\\n       $(pg_config --sharedir)/extension/<\u002Fpre>\n      <\u002Farticle>\n      <article class=\"card install-card reveal\" data-stagger=\"\" style=\"--i:2\">\n        <span class=\"install-tag\">// dev · laptop<\u002Fspan>\n        <h3>Local Postgres in 60s<\u002Fh3>\n<pre>docker run -d --name pgm \\\n  pgvector/pgvector:pg17<\u002Fpre>\n<pre>curl -LO https://…/pgmnemo-0.4.1.zip\ndocker cp pgmnemo-0.4.1.zip pgm:/tmp/<\u002Fpre>\n      <\u002Farticle>\n    <\u002Fdiv>\n\n    <div class=\"install-callout reveal\">\n      <div>\n        <b>PostgreSQL 17<\u002Fb> blocking CI · <b>PG 14 / 15 / 16<\u002Fb> aspirational · <b>pgvector ≥ 0.7.0<\u002Fb> required\n      <\u002Fdiv>\n      <a href=\"#docs\">Full install guide ↗<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<!-- ============ FOOTER ============ -->\n<footer class=\"footer\">\n  <div class=\"footer-inner\">\n    <div>\n      <a href=\"#\" class=\"logo\">\n        <span class=\"logo-mark\" aria-hidden=\"true\"><\u002Fspan>\n        <span>pgmnemo<\u002Fspan>\n      <\u002Fa>\n      <p class=\"lic\">Apache 2.0 — free to self-host.<\u002Fp>\n      <pre class=\"bibtex\">@inproceedings{gaydabura2026pgmnemo,\n  author    = {Gaydabura, M.},\n  title     = {pgmnemo: Provenance-Gated Memory\n               for AI Agents in PostgreSQL},\n  booktitle = {ICSE-SEIP},\n  year      = {2026}\n}<\u002Fpre>\n    <\u002Fdiv>\n    <div class=\"footer-col\">\n      <h5>// project<\u002Fh5>\n      <ul>\n        <li><a href=\"#\" rel=\"external\">GitHub ↗<\u002Fa><\u002Fli>\n        <li><a href=\"#install\" rel=\"external\">PGXN ↗<\u002Fa><\u002Fli>\n        <li><a href=\"#docs\">Docs<\u002Fa><\u002Fli>\n        <li><a href=\"#\">Changelog<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"footer-col\">\n      <h5>// resources<\u002Fh5>\n      <ul>\n        <li><a href=\"#\">COMPETITIVE_REALITY.md<\u002Fa><\u002Fli>\n        <li><a href=\"#\">ROADMAP.md<\u002Fa><\u002Fli>\n        <li><a href=\"#\">Security<\u002Fa><\u002Fli>\n        <li><a href=\"#research\">Papers<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n(() => {\n  // ----- INTERSECTION OBSERVER for reveal & bar fills -----\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(en => {\n      if (en.isIntersecting) {\n        en.target.classList.add('in');\n        en.target.querySelectorAll('.bar-fill').forEach(b => {\n          const w = b.getAttribute('data-w');\n          if (w) requestAnimationFrame(() => b.style.width = w + '%');\n        });\n        io.unobserve(en.target);\n      }\n    });\n  }, { threshold: 0.12 });\n  document.querySelectorAll('.reveal').forEach(el => io.observe(el));\n\n  // ----- TAB NAV active state -----\n  const tabLinks = document.querySelectorAll('.tabnav a[data-tab]');\n  const tabMap = new Map();\n  tabLinks.forEach(a => {\n    const id = a.getAttribute('href').slice(1);\n    const el = document.getElementById(id);\n    if (el) tabMap.set(id, a);\n  });\n\n  const setActive = (id) => {\n    tabLinks.forEach(a => a.classList.toggle('active', a.dataset.tab === id));\n    const active = tabMap.get(id);\n    if (active) {\n      const rail = active.parentElement;\n      const aLeft = active.offsetLeft, aRight = aLeft + active.offsetWidth;\n      const rLeft = rail.scrollLeft, rRight = rLeft + rail.clientWidth;\n      if (aLeft < rLeft + 16) rail.scrollTo({left: aLeft - 16, behavior:'smooth'});\n      else if (aRight > rRight - 16) rail.scrollTo({left: aRight - rail.clientWidth + 16, behavior:'smooth'});\n    }\n  };\n\n  const stickyOffset = 64 + 50;\n  const tabSections = [...tabMap.keys()].map(id => document.getElementById(id)).filter(Boolean);\n  const onScrollTabs = () => {\n    let current = null;\n    for (const s of tabSections) {\n      const top = s.getBoundingClientRect().top;\n      if (top - stickyOffset <= 8) current = s.id;\n      else break;\n    }\n    if (current) setActive(current);\n    else tabLinks.forEach(a => a.classList.remove('active'));\n  };\n  window.addEventListener('scroll', onScrollTabs, {passive:true});\n  onScrollTabs();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
